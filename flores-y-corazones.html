<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flores y Corazones</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400&family=Cormorant+Garamond:ital,wght@1,300&display=swap" rel="stylesheet">
  <style>
    *,*::after,*::before{padding:0;margin:0;box-sizing:border-box}

    :root{
      --dark-color:#010113;
      --green:#028137;
      --yellow:#ffd1dc;
    }

    body{
      display:flex;
      align-items:flex-end;
      justify-content:center;
      min-height:100vh;
      background-color:var(--dark-color);
      overflow:hidden;
      perspective:1000px;
      font-family:'Playfair Display', serif;
    }

    /* TITLE */
    .title-overlay{
      position:fixed;
      top:0; left:0; right:0; bottom:0;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      z-index:200;
      pointer-events:none;
      animation: fadeTitle 3s ease-in forwards;
    }
    .title-overlay h1{
      font-family:'Cormorant Garamond', serif;
      font-size:clamp(2rem,8vw,6rem);
      font-style:italic;
      font-weight:300;
      color:rgba(255,200,210,0.9);
      text-shadow:0 0 40px rgba(255,100,150,0.5), 0 0 80px rgba(255,100,150,0.2);
      letter-spacing:0.15em;
      animation: titleGlow 4s ease-in-out infinite alternate;
    }
    .title-overlay p{
      font-size:clamp(0.7rem,2vw,1rem);
      color:rgba(255,200,210,0.4);
      letter-spacing:0.5em;
      margin-top:1rem;
      text-transform:uppercase;
    }
    @keyframes fadeTitle{
      0%{opacity:1}
      70%{opacity:1}
      100%{opacity:0; pointer-events:none}
    }
    @keyframes titleGlow{
      from{text-shadow:0 0 40px rgba(255,100,150,0.5),0 0 80px rgba(255,100,150,0.2)}
      to{text-shadow:0 0 60px rgba(255,150,180,0.8),0 0 120px rgba(255,100,150,0.4)}
    }

    /* NIGHT OVERLAY */
    .night{
      position:fixed;
      left:50%;
      top:0;
      transform:translateX(-50%);
      width:100%;
      height:100%;
      filter:blur(0.1vmin);
      background-image:
        radial-gradient(ellipse at top, transparent 0%, var(--dark-color)),
        radial-gradient(ellipse at bottom, rgba(145,233,255,0.15)),
        repeating-linear-gradient(220deg, rgb(0,0,0) 0px, rgb(0,0,0) 19px, transparent 19px, transparent 22px),
        repeating-linear-gradient(189deg, rgb(0,0,0) 0px, rgb(0,0,0) 19px, transparent 19px, transparent 22px),
        repeating-linear-gradient(148deg, rgb(0,0,0) 0px, rgb(0,0,0) 19px, transparent 19px, transparent 22px),
        linear-gradient(90deg, rgb(255,94,0), rgb(240,240,240));
    }

    /* STARS */
    .stars{
      position:fixed;
      top:0; left:0;
      width:100%; height:60%;
      z-index:1;
    }
    .star{
      position:absolute;
      border-radius:50%;
      background:#fff;
      animation: twinkle var(--d,3s) ease-in-out infinite alternate;
    }
    @keyframes twinkle{
      from{opacity:0.1; transform:scale(0.8)}
      to{opacity:0.9; transform:scale(1.2)}
    }

    /* MOON */
    .moon{
      position:fixed;
      top:8vh; right:12vw;
      width:clamp(40px,6vmin,70px);
      height:clamp(40px,6vmin,70px);
      border-radius:50%;
      background:radial-gradient(circle at 35% 35%, #fffde0, #ffd700 60%, #f5a623);
      box-shadow:0 0 20px 8px rgba(255,220,50,0.3), 0 0 60px 20px rgba(255,200,0,0.1);
      z-index:5;
      animation: moonFloat 8s ease-in-out infinite alternate;
    }
    @keyframes moonFloat{
      from{transform:translateY(0)}
      to{transform:translateY(-8px)}
    }

    /* FLOWERS CONTAINER */
    .flowers{
      position:relative;
      transform:scale(0.9);
      z-index:10;
    }

    /* INDIVIDUAL FLOWER */
    .flower{
      position:absolute;
      bottom:10vmin;
      transform-origin:bottom center;
      z-index:10;
      --fl-speed:0.8s;
    }
    .flower--1{
      left:50%;
      animation:moving-flower-1 4s linear infinite;
      -webkit-animation:moving-flower-1 4s linear infinite;
    }
    .flower--2{
      left:50%;
      transform:rotate(20deg);
      animation:moving-flower-2 4s linear infinite;
      -webkit-animation:moving-flower-2 4s linear infinite;
    }
    .flower--3{
      left:50%;
      transform:rotate(-15deg);
      animation:moving-flower-3 4s linear infinite;
      -webkit-animation:moving-flower-3 4s linear infinite;
    }
    .flower--4{
      left:40%;
      transform:rotate(10deg);
      animation:moving-flower-2 4s linear infinite;
      -webkit-animation:moving-flower-2 4s linear infinite;
    }

    /* FLOWER LINE (STEM) */
    .flower__line{
      height:70vmin;
      width:1.5vmin;
      background-image:linear-gradient(to left, transparent, rgba(0,0,0,0.2), transparent, rgba(255,255,255,0.2)),
        linear-gradient(to top, transparent 10%, #056d24, #028137);
      box-shadow:inset 0 0 2px rgba(0,0,0,0.5);
      animation:grow-flower-tree 4s backwards;
      -webkit-animation:grow-flower-tree 4s backwards;
      animation-delay:0.3s;
    }
    .flower--1 .flower__line{animation-delay:0.3s;-webkit-animation-delay:0.3s}
    .flower--2 .flower__line{height:60vmin;animation-delay:0.6s;-webkit-animation-delay:0.6s}
    .flower--3 .flower__line{animation-delay:0.9s;-webkit-animation-delay:0.9s}
    .flower--4 .flower__line{height:55vmin;animation-delay:0.5s;-webkit-animation-delay:0.5s}

    /* STEM LEAVES */
    .flower__line__leaf{
      --w:7vmin;
      --h:calc(var(--w) + 2vmin);
      position:absolute;
      top:20%;
      left:90%;
      width:var(--w);
      height:var(--h);
      border-top-right-radius:var(--h);
      border-bottom-left-radius:var(--h);
      background-image:linear-gradient(to top, rgba(12,94,32,0.4), #028137);
    }
    .flower__line__leaf--1{transform:rotate(70deg) rotateY(30deg)}
    .flower__line__leaf--2{top:45%;transform:rotate(70deg) rotateY(30deg)}
    .flower__line__leaf--3,.flower__line__leaf--4{border-top-right-radius:0;border-bottom-left-radius:0;border-top-left-radius:var(--h);border-bottom-right-radius:var(--h);left:-460%;top:12%;transform:rotate(-70deg) rotateY(30deg)}
    .flower__line__leaf--4{top:40%}
    .flower__line__leaf--5{top:0;transform-origin:left;transform:rotate(70deg) rotateY(30deg) scale(0.6)}
    .flower__line__leaf--6{top:-2%;left:-450%;transform-origin:right;transform:rotate(-70deg) rotateY(30deg) scale(0.6)}

    /* FLOWER PETALS CONTAINER */
    .flower__leafs{
      position:relative;
      animation:blooming-flower 2s backwards;
      -webkit-animation:blooming-flower 2s backwards;
    }
    .flower__leafs--1{animation-delay:1.1s;-webkit-animation-delay:1.1s}
    .flower__leafs--2{animation-delay:1.4s;-webkit-animation-delay:1.4s}
    .flower__leafs--3{animation-delay:1.7s;-webkit-animation-delay:1.7s}
    .flower__leafs--4{animation-delay:1.5s;-webkit-animation-delay:1.5s}

    .flower__leafs::after{
      content:"";
      position:absolute;
      left:0; top:0;
      transform:translate(-50%,-100%);
      width:8vmin; height:8vmin;
      background-color:#ffb6c1;
      filter:blur(10vmin);
    }

    /* PETALS */
    .flower__leaf{
      position:absolute;
      bottom:0; left:50%;
      width:8vmin; height:11vmin;
      border-radius:51% 49% 47% 53%/44% 45% 55% 69%;
      background-color:#ffd1dc;
      background-image:linear-gradient(to top, #ffb6c1dc, #ff6b8a, #ff4575dc);
      transform-origin:bottom center;
      opacity:0.9;
      box-shadow:inset 0 0 2vmin rgba(255,255,255,0.5);
    }
    .flower__leaf--1{transform:translate(-10%,1%) rotateY(40deg) rotateX(-50deg)}
    .flower__leaf--2{transform:translate(-50%,-4%) rotateX(40deg)}
    .flower__leaf--3{transform:translate(-90%,0%) rotateY(45deg) rotateX(50deg)}
    .flower__leaf--4{width:8vmin;height:8vmin;transform-origin:bottom left;transform:translate(0%,18%) rotateX(70deg) rotate(-43deg);background-image:linear-gradient(to top, #ffb6c1, #ff6b8a, #ff4575dc);z-index:1;opacity:0.8}

    /* WHITE CENTER */
    .flower__white-circle{
      position:absolute;
      left:-3.5vmin; top:-3vmin;
      width:9vmin; height:4vmin;
      border-radius:50%;
      background-color:#fff;
    }
    .flower__white-circle::after{
      content:"";
      position:absolute;
      left:50%; top:45%;
      transform:translate(-50%,-50%);
      width:60%; height:60%;
      border-radius:inherit;
      background-image:repeating-linear-gradient(135deg,rgba(0,0,0,0.03) 0px,rgba(0,0,0,0.03) 1px,transparent 1px,transparent 12px),
        repeating-linear-gradient(45deg,rgba(0,0,0,0.03) 0px,rgba(0,0,0,0.03) 1px,transparent 1px,transparent 12px),
        linear-gradient(90deg,rgb(255,235,18),rgb(255,206,0));
    }

    /* FLOWER LIGHTS (STAMENS) */
    .flower__light{
      position:absolute;
      bottom:0vmin;
      width:1vmin; height:1vmin;
      background-color:rgb(255,251,0);
      border-radius:50%;
      filter:blur(0.2vmin);
      animation:light-ans 4s linear infinite backwards;
      -webkit-animation:light-ans 4s linear infinite backwards;
    }
    .flower__light:nth-child(odd){background-color:#028137}
    .flower__light--1{left:-2vmin;animation-delay:1s;-webkit-animation-delay:1s}
    .flower__light--2{left:3vmin;animation-delay:0.5s;-webkit-animation-delay:0.5s}
    .flower__light--3{left:-6vmin;animation-delay:0.3s;-webkit-animation-delay:0.3s}
    .flower__light--4{left:6vmin;animation-delay:0.9s;-webkit-animation-delay:0.9s}
    .flower__light--5{left:-1vmin;animation-delay:1.5s;-webkit-animation-delay:1.5s}
    .flower__light--6{left:-4vmin;animation-delay:3s;-webkit-animation-delay:3s}
    .flower__light--7{left:3vmin;animation-delay:2s;-webkit-animation-delay:2s}
    .flower__light--8{left:-6vmin;animation-delay:3.5s;-webkit-animation-delay:3.5s}

    /* GRASS */
    .flower__grass{
      --c:#028137;
      --line-w:1.5vmin;
      position:absolute;
      bottom:12vmin; left:-7vmin;
      display:flex; flex-direction:column;
      align-items:flex-end;
      z-index:20;
      transform-origin:bottom center;
      transform:rotate(-48deg) rotateY(40deg);
    }
    .flower__grass--1{
      animation:moving-grass 2s linear infinite;
      -webkit-animation:moving-grass 2s linear infinite;
    }
    .flower__grass--2{
      left:2vmin; bottom:10vmin;
      transform:scale(0.5) rotate(75deg) rotateX(10deg) rotateY(-200deg);
      opacity:0.8; z-index:0;
      animation:moving-grass--2 1.5s linear infinite;
      -webkit-animation:moving-grass--2 1.5s linear infinite;
    }
    .flower__grass--top{
      width:7vmin; height:10vmin;
      border-top-right-radius:100%;
      border-right:var(--line-w) solid var(--c);
      transform-origin:bottom center;
      transform:rotate(-2deg);
    }
    .flower__grass--bottom{
      margin-top:-2px;
      width:var(--line-w); height:25vmin;
      background-image:linear-gradient(to top, transparent, var(--c));
    }
    .flower__grass__leaf{
      --size:10vmin;
      position:absolute;
      width:calc(var(--size) * 2.1);
      height:var(--size);
      border-top-left-radius:var(--size);
      border-top-right-radius:var(--size);
      background-image:linear-gradient(to top, transparent 30%, transparent 30%, var(--c));
      z-index:100;
    }
    .flower__grass__leaf--1{top:-6%;left:30%;--size:6vmin;transform:rotate(-20deg);animation:growing-grass-ans--1 2s 2.6s linear backwards;-webkit-animation:growing-grass-ans--1 2s 2.6s linear backwards}
    .flower__grass__leaf--2{top:-5%;left:-110%;--size:6vmin;transform:rotate(10deg);animation:growing-grass-ans--2 2s 2.4s linear backwards;-webkit-animation:growing-grass-ans--2 2s 2.4s linear backwards}
    .flower__grass__leaf--3{top:5%;left:60%;--size:8vmin;transform:rotate(-18deg) rotateX(-20deg);animation:growing-grass-ans--3 2s 2.2s linear backwards;-webkit-animation:growing-grass-ans--3 2s 2.2s linear backwards}
    .flower__grass__leaf--4{top:6%;left:-135%;--size:8vmin;transform:rotate(2deg);animation:growing-grass-ans--4 2s 2s linear backwards;-webkit-animation:growing-grass-ans--4 2s 2s linear backwards}
    .flower__grass__leaf--5{top:20%;left:60%;--size:10vmin;transform:rotate(-24deg) rotateX(-20deg);animation:growing-grass-ans--5 2s 1.8s linear backwards;-webkit-animation:growing-grass-ans--5 2s 1.8s linear backwards}
    .flower__grass__leaf--6{top:22%;left:-180%;--size:10vmin;transform:rotate(10deg);animation:growing-grass-ans--6 2s 1.6s linear backwards;-webkit-animation:growing-grass-ans--6 2s 1.6s linear backwards}
    .flower__grass__leaf--7{top:39%;left:70%;--size:10vmin;transform:rotate(-10deg);animation:growing-grass-ans--7 2s 1.4s linear backwards;-webkit-animation:growing-grass-ans--7 2s 1.4s linear backwards}
    .flower__grass__leaf--8{top:40%;left:-215%;--size:11vmin;transform:rotate(10deg);animation:growing-grass-ans--8 2s 1.2s linear backwards;-webkit-animation:growing-grass-ans--8 2s 1.2s linear backwards}
    .flower__grass__overlay{
      position:absolute; top:-10%; right:0;
      width:100%; height:100%;
      background-color:rgba(0,0,0,0.6);
      filter:blur(1.5vmin);
      z-index:100;
    }

    /* GROWING GRASS SECTION */
    .growing-grass{
      position:absolute;
      bottom:0; left:0;
      width:100vw; height:30vmin;
      z-index:30;
      pointer-events:none;
    }
    .flower__g-long{
      --w:2vmin; --h:6vmin; --c:#0d6632;
      position:absolute; bottom:10vmin; left:-3vmin;
      transform-origin:bottom center;
      transform:rotate(-30deg) rotateY(-20deg);
      display:flex; flex-direction:column; align-items:flex-end;
      animation:flower-g-long-ans 3s linear infinite;
      -webkit-animation:flower-g-long-ans 3s linear infinite;
    }
    .flower__g-long__top{
      width:calc(var(--w) * 1vmin);
      width:var(--w);
      height:var(--h);
      border-top-right-radius:100%;
      border-right:0.7vmin solid var(--c);
      transform-origin:bottom center;
      transform:translate(-0.7vmin, 1vmin);
    }
    .flower__g-long__bottom{
      width:var(--w); height:50vmin;
      transform-origin:bottom center;
      background-image:linear-gradient(to top, transparent 30%, var(--c));
      box-shadow:inset 0 0 2px rgba(0,0,0,0.5);
      clip-path:polygon(35% 0, 65% 1%, 100% 100%, 0% 100%);
      clip-path:polygon(35% 0, 65% 1%, 100% 100%, 0% 100%);
    }

    /* RIGHT GRASS ELEMENTS */
    .flower__g-right{
      position:absolute; bottom:5vmin; left:-2vmin;
      transform-origin:bottom left;
      transform:rotate(20deg);
    }
    .flower__g-right--1{animation:flower-g-right-ans 2.5s linear infinite;-webkit-animation:flower-g-right-ans 2.5s linear infinite}
    .flower__g-right--2{left:5vmin;animation:flower-g-right-ans--2 3s linear infinite;-webkit-animation:flower-g-right-ans--2 3s linear infinite}
    .flower__g-right .leaf,.flower__g-right--2 .leaf{
      width:30vmin; height:50vmin;
      border-top-left-radius:100%;
      border-left:2vmin solid #028137;
      background-image:linear-gradient(to bottom, transparent, var(--dark-color) 60%);
      -webkit-mask-image:linear-gradient(to top, transparent 30%, #028137 60%);
      mask-image:linear-gradient(to top, transparent 30%, #028137 60%);
      opacity:0.8; filter:blur(0.3vmin);
    }
    .flower__g-right--2 .leaf{height:75vmin;filter:blur(0.3vmin);opacity:0.8}

    /* FRONT GRASS */
    .flower__g-front{
      position:absolute; bottom:6vmin; left:2.5vmin;
      z-index:100;
      transform-origin:bottom center;
      transform:rotate(-28deg) rotateY(30deg) scale(1.04);
      animation:flower__g-front-ans 2s linear infinite;
      -webkit-animation:flower__g-front-ans 2s linear infinite;
    }
    .flower__g-front__line{width:0.3vmin; height:20vmin; background-image:linear-gradient(to top, transparent, #028137, transparent 100%); position:relative}
    .flower__g-front__leaf-wrapper{
      position:absolute; top:0; left:0;
      transform-origin:bottom left;
      transform:rotate(10deg);
    }
    .flower__g-front__leaf-wrapper:nth-child(even){
      left:0vmin;
      transform:rotateY(-180deg) rotate(5deg);
    }
    .flower__g-front__leaf{
      width:10vmin; height:10vmin;
      border-radius:100% 0% 100% 0% / 100% 0% 100% 0%;
      background-image:linear-gradient(to bottom left, #028137 50%, transparent);
      -webkit-mask-image:linear-gradient(to bottom right, #028137 50%, transparent 50%);
      mask-image:linear-gradient(to bottom right, #028137 50%, transparent 50%);
    }

    /* FLOATING HEARTS */
    .bubbles{
      position:fixed;
      bottom:0; left:0;
      width:100%; height:100%;
      z-index:50;
      pointer-events:none;
      overflow:hidden;
    }
    .bubble{
      position:absolute;
      bottom:-10%;
      animation:bubble-float var(--duration,8s) var(--delay,0s) ease-in infinite;
      opacity:0;
    }
    .bubble svg{
      width:var(--size,2vmin);
      height:var(--size,2vmin);
      fill:var(--col,#ff6b8a);
      filter:drop-shadow(0 0 4px var(--col,#ff6b8a));
    }

    @keyframes bubble-float{
      0%{transform:translateX(0) rotate(0deg) scale(0.3);opacity:0}
      10%{opacity:0.8}
      80%{opacity:0.4}
      100%{transform:translateX(var(--drift,20px)) rotate(360deg) scale(1);bottom:110%;opacity:0}
    }

    /* LEAF (for long grass) */
    .leaf{
      width:30vmin; height:50vmin;
      border-top-left-radius:100%;
      border-left:2vmin solid #028137;
    }

    /* LONG-G LEAVES */
    .long-g{
      position:absolute;
      bottom:0;
      z-index:40;
    }
    .long-g .grow-ans{
      animation:grow-ans var(--dur,2s) var(--del,-3s) ease-out backwards;
      -webkit-animation:grow-ans var(--dur,2s) var(--del,-3s) ease-out backwards;
    }
    .long-g .leaf-item{
      width:3vmin; height:20vmin;
      background-image:linear-gradient(to top, transparent 10%, #028137);
      border-top-left-radius:100%;
      border-top-right-radius:100%;
      transform-origin:bottom center;
    }

    /* ===== ANIMATIONS ===== */
    @keyframes moving-flower-1{
      0%,100%{transform:rotate(3deg)}
      50%{transform:rotate(-3deg)}
    }
    @keyframes moving-flower-2{
      0%,100%{transform:rotate(23deg)}
      50%{transform:rotate(17deg)}
    }
    @keyframes moving-flower-3{
      0%,100%{transform:rotate(-12deg)}
      50%{transform:rotate(-18deg)}
    }
    @-webkit-keyframes moving-flower-1{
      0%,100%{transform:rotate(3deg)}
      50%{transform:rotate(-3deg)}
    }
    @-webkit-keyframes moving-flower-2{
      0%,100%{transform:rotate(23deg)}
      50%{transform:rotate(17deg)}
    }
    @-webkit-keyframes moving-flower-3{
      0%,100%{transform:rotate(-12deg)}
      50%{transform:rotate(-18deg)}
    }

    @keyframes blooming-flower{
      0%{transform:scale(0);opacity:0}
    }
    @-webkit-keyframes blooming-flower{
      0%{transform:scale(0);opacity:0}
    }

    @keyframes blooming-leaf-right{
      0%{transform-origin:left;transform:rotate(70deg) rotateY(30deg) scale(0)}
    }
    @-webkit-keyframes blooming-leaf-right{
      0%{transform-origin:left;transform:rotate(70deg) rotateY(30deg) scale(0)}
    }
    @keyframes blooming-leaf-left{
      0%{transform-origin:right;transform:rotate(-70deg) rotateY(30deg) scale(0)}
    }
    @-webkit-keyframes blooming-leaf-left{
      0%{transform-origin:right;transform:rotate(-70deg) rotateY(30deg) scale(0)}
    }

    @keyframes grow-flower-tree{
      0%{height:0;border-radius:0}
    }
    @-webkit-keyframes grow-flower-tree{
      0%{height:0;border-radius:0}
    }

    @keyframes light-ans{
      0%{opacity:0;bottom:0vmin}
      25%{opacity:1}
      100%{opacity:0;bottom:30vmin;left:calc(var(--left)*1.5)}
    }
    @-webkit-keyframes light-ans{
      0%{opacity:0;bottom:0vmin}
      25%{opacity:1}
      100%{opacity:0;bottom:30vmin;left:calc(var(--left)*1.5)}
    }

    @keyframes moving-grass{
      0%,100%{transform:rotate(-48deg) rotateY(40deg)}
      50%{transform:rotate(-50deg) rotateY(40deg)}
    }
    @-webkit-keyframes moving-grass{
      0%,100%{transform:rotate(-48deg) rotateY(40deg)}
      50%{transform:rotate(-50deg) rotateY(40deg)}
    }
    @keyframes moving-grass--2{
      0%,100%{transform:scale(0.5) rotate(75deg) rotateX(10deg) rotateY(-200deg)}
      50%{transform:scale(0.5) rotate(79deg) rotateX(10deg) rotateY(-200deg)}
    }
    @-webkit-keyframes moving-grass--2{
      0%,100%{transform:scale(0.5) rotate(75deg) rotateX(10deg) rotateY(-200deg)}
      50%{transform:scale(0.5) rotate(79deg) rotateX(10deg) rotateY(-200deg)}
    }

    @keyframes flower-g-long-ans{
      0%,100%{transform:rotate(-30deg) rotateY(-20deg)}
      50%{transform:rotate(-32deg) rotateY(-20deg)}
    }
    @-webkit-keyframes flower-g-long-ans{
      0%,100%{transform:rotate(-30deg) rotateY(-20deg)}
      50%{transform:rotate(-32deg) rotateY(-20deg)}
    }

    @keyframes flower-g-right-ans{
      0%,100%{transform:rotate(20deg)}
      50%{transform:rotate(24deg) rotateX(-20deg)}
    }
    @-webkit-keyframes flower-g-right-ans{
      0%,100%{transform:rotate(20deg)}
      50%{transform:rotate(24deg) rotateX(-20deg)}
    }
    @keyframes flower-g-right-ans--2{
      0%,100%{transform:rotateY(-180deg) rotate(0deg) rotateX(-20deg)}
      50%{transform:rotateY(-180deg) rotate(6deg) rotateX(-20deg)}
    }
    @-webkit-keyframes flower-g-right-ans--2{
      0%,100%{transform:rotateY(-180deg) rotate(0deg) rotateX(-20deg)}
      50%{transform:rotateY(-180deg) rotate(6deg) rotateX(-20deg)}
    }

    @keyframes flower__g-front-ans{
      0%,100%{transform:rotate(-28deg) rotateY(30deg) scale(1.04)}
      50%{transform:rotate(-35deg) rotateY(40deg) scale(1.04)}
    }
    @-webkit-keyframes flower__g-front-ans{
      0%,100%{transform:rotate(-28deg) rotateY(30deg) scale(1.04)}
      50%{transform:rotate(-35deg) rotateY(40deg) scale(1.04)}
    }

    @keyframes growing-grass-ans--1{
      0%{transform-origin:bottom left;transform:rotate(-20deg) scale(0)}
    }
    @-webkit-keyframes growing-grass-ans--1{
      0%{transform-origin:bottom left;transform:rotate(-20deg) scale(0)}
    }
    @keyframes growing-grass-ans--2{
      0%{transform-origin:bottom right;transform:rotate(10deg) scale(0)}
    }
    @-webkit-keyframes growing-grass-ans--2{
      0%{transform-origin:bottom right;transform:rotate(10deg) scale(0)}
    }
    @keyframes growing-grass-ans--3{
      0%{transform-origin:bottom left;transform:rotate(-18deg) rotateX(-20deg) scale(0)}
    }
    @keyframes growing-grass-ans--4{
      0%{transform-origin:bottom right;transform:rotate(2deg) scale(0)}
    }
    @keyframes growing-grass-ans--5{
      0%{transform-origin:bottom left;transform:rotate(-24deg) rotateX(-20deg) scale(0)}
    }
    @keyframes growing-grass-ans--6{
      0%{transform-origin:bottom right;transform:rotate(10deg) scale(0)}
    }
    @keyframes growing-grass-ans--7{
      0%{transform-origin:bottom left;transform:rotate(-10deg) scale(0)}
    }
    @keyframes growing-grass-ans--8{
      0%{transform-origin:bottom right;transform:rotate(10deg) scale(0)}
    }

    @keyframes grow-ans{
      0%{transform:rotate(var(--rot,0deg)) scale(0)}
    }

    /* GROUND */
    .ground{
      position:fixed;
      bottom:0; left:0;
      width:100%; height:12vmin;
      background:linear-gradient(to top, #010b05, #012210, #014520 80%, transparent);
      z-index:25;
    }

    /* FIREFLIES */
    .firefly{
      position:fixed;
      border-radius:50%;
      background:#ffe566;
      box-shadow:0 0 6px 3px #ffe566;
      animation:fireflyFloat var(--dur,6s) var(--del,0s) ease-in-out infinite alternate;
      z-index:60;
      opacity:0;
    }
    @keyframes fireflyFloat{
      0%{transform:translate(0,0);opacity:0}
      20%{opacity:0.8}
      80%{opacity:0.6}
      100%{transform:translate(var(--tx,30px),var(--ty,-40px));opacity:0}
    }
  </style>
</head>
<body>

<!-- Title Screen -->
<div class="title-overlay">
  <h1>Flores y Corazones</h1>
  <p>Una noche encantada</p>
</div>

<!-- Night sky -->
<div class="night"></div>
<div class="moon"></div>

<!-- Stars (generated by JS) -->
<div class="stars" id="stars"></div>

<!-- Fireflies -->
<div id="fireflies"></div>

<!-- Ground -->
<div class="ground"></div>

<!-- FLOWERS -->
<div class="flowers">

  <!-- Flower 1 -->
  <div class="flower flower--1">
    <div class="flower__leafs flower__leafs--1">
      <div class="flower__leaf flower__leaf--1"></div>
      <div class="flower__leaf flower__leaf--2"></div>
      <div class="flower__leaf flower__leaf--3"></div>
      <div class="flower__leaf flower__leaf--4"></div>
      <div class="flower__white-circle"></div>
      <div class="flower__light flower__light--1"></div>
      <div class="flower__light flower__light--2"></div>
      <div class="flower__light flower__light--3"></div>
      <div class="flower__light flower__light--4"></div>
      <div class="flower__light flower__light--5"></div>
      <div class="flower__light flower__light--6"></div>
      <div class="flower__light flower__light--7"></div>
      <div class="flower__light flower__light--8"></div>
    </div>
    <div class="flower__line">
      <div class="flower__line__leaf flower__line__leaf--1"></div>
      <div class="flower__line__leaf flower__line__leaf--2"></div>
      <div class="flower__line__leaf flower__line__leaf--3"></div>
      <div class="flower__line__leaf flower__line__leaf--4"></div>
      <div class="flower__line__leaf flower__line__leaf--5"></div>
      <div class="flower__line__leaf flower__line__leaf--6"></div>
    </div>
  </div>

  <!-- Flower 2 -->
  <div class="flower flower--2">
    <div class="flower__leafs flower__leafs--2">
      <div class="flower__leaf flower__leaf--1"></div>
      <div class="flower__leaf flower__leaf--2"></div>
      <div class="flower__leaf flower__leaf--3"></div>
      <div class="flower__leaf flower__leaf--4"></div>
      <div class="flower__white-circle"></div>
      <div class="flower__light flower__light--1"></div>
      <div class="flower__light flower__light--2"></div>
      <div class="flower__light flower__light--3"></div>
      <div class="flower__light flower__light--4"></div>
      <div class="flower__light flower__light--5"></div>
      <div class="flower__light flower__light--6"></div>
      <div class="flower__light flower__light--7"></div>
      <div class="flower__light flower__light--8"></div>
    </div>
    <div class="flower__line">
      <div class="flower__line__leaf flower__line__leaf--1"></div>
      <div class="flower__line__leaf flower__line__leaf--2"></div>
      <div class="flower__line__leaf flower__line__leaf--3"></div>
      <div class="flower__line__leaf flower__line__leaf--4"></div>
    </div>
  </div>

  <!-- Flower 3 -->
  <div class="flower flower--3">
    <div class="flower__leafs flower__leafs--3">
      <div class="flower__leaf flower__leaf--1"></div>
      <div class="flower__leaf flower__leaf--2"></div>
      <div class="flower__leaf flower__leaf--3"></div>
      <div class="flower__leaf flower__leaf--4"></div>
      <div class="flower__white-circle"></div>
      <div class="flower__light flower__light--1"></div>
      <div class="flower__light flower__light--2"></div>
      <div class="flower__light flower__light--3"></div>
      <div class="flower__light flower__light--4"></div>
      <div class="flower__light flower__light--5"></div>
      <div class="flower__light flower__light--6"></div>
      <div class="flower__light flower__light--7"></div>
      <div class="flower__light flower__light--8"></div>
    </div>
    <div class="flower__line">
      <div class="flower__line__leaf flower__line__leaf--1"></div>
      <div class="flower__line__leaf flower__line__leaf--2"></div>
      <div class="flower__line__leaf flower__line__leaf--3"></div>
      <div class="flower__line__leaf flower__line__leaf--4"></div>
    </div>
  </div>

  <!-- Flower 4 -->
  <div class="flower flower--4">
    <div class="flower__leafs flower__leafs--4">
      <div class="flower__leaf flower__leaf--1"></div>
      <div class="flower__leaf flower__leaf--2"></div>
      <div class="flower__leaf flower__leaf--3"></div>
      <div class="flower__leaf flower__leaf--4"></div>
      <div class="flower__white-circle"></div>
      <div class="flower__light flower__light--1"></div>
      <div class="flower__light flower__light--2"></div>
      <div class="flower__light flower__light--3"></div>
      <div class="flower__light flower__light--4"></div>
      <div class="flower__light flower__light--5"></div>
    </div>
    <div class="flower__line">
      <div class="flower__line__leaf flower__line__leaf--1"></div>
      <div class="flower__line__leaf flower__line__leaf--2"></div>
    </div>
  </div>

  <!-- Grass left -->
  <div class="flower__grass flower__grass--1">
    <div class="flower__grass--top"></div>
    <div class="flower__grass--bottom"></div>
    <div class="flower__grass__leaf flower__grass__leaf--1"></div>
    <div class="flower__grass__leaf flower__grass__leaf--2"></div>
    <div class="flower__grass__leaf flower__grass__leaf--3"></div>
    <div class="flower__grass__leaf flower__grass__leaf--4"></div>
    <div class="flower__grass__leaf flower__grass__leaf--5"></div>
    <div class="flower__grass__leaf flower__grass__leaf--6"></div>
    <div class="flower__grass__leaf flower__grass__leaf--7"></div>
    <div class="flower__grass__leaf flower__grass__leaf--8"></div>
    <div class="flower__grass__overlay"></div>
  </div>

  <!-- Grass right -->
  <div class="flower__grass flower__grass--2">
    <div class="flower__grass--top"></div>
    <div class="flower__grass--bottom"></div>
    <div class="flower__grass__leaf flower__grass__leaf--1"></div>
    <div class="flower__grass__leaf flower__grass__leaf--2"></div>
    <div class="flower__grass__leaf flower__grass__leaf--3"></div>
    <div class="flower__grass__leaf flower__grass__leaf--4"></div>
    <div class="flower__grass__overlay"></div>
  </div>

  <!-- Long grass -->
  <div class="grow-ans" style="--d:1.2s;position:absolute;bottom:0;left:-5vmin;animation:flower-g-long-ans 3s linear infinite">
    <div class="flower__g-long">
      <div class="flower__g-long__top"></div>
      <div class="flower__g-long__bottom"></div>
    </div>
  </div>

  <!-- Right decorative grass -->
  <div class="grow-ans" style="--d:2.4s;position:absolute;bottom:0;left:8vmin">
    <div class="flower__g-right flower__g-right--1">
      <div class="leaf"></div>
    </div>
  </div>
  <div class="grow-ans" style="--d:2.8s;position:absolute;bottom:0;left:12vmin">
    <div class="flower__g-right flower__g-right--2">
      <div class="leaf"></div>
    </div>
  </div>

</div>

<!-- FLOATING HEARTS -->
<div class="bubbles" id="bubbles"></div>

<script>
// Generate stars
const starsEl = document.getElementById('stars');
for(let i=0;i<120;i++){
  const s = document.createElement('div');
  s.className='star';
  const sz = Math.random()*2+0.5;
  s.style.cssText = `
    left:${Math.random()*100}%;
    top:${Math.random()*100}%;
    width:${sz}px;
    height:${sz}px;
    --d:${(Math.random()*3+1).toFixed(1)}s;
    animation-delay:${(Math.random()*4).toFixed(1)}s;
  `;
  starsEl.appendChild(s);
}

// Generate fireflies
const ffEl = document.getElementById('fireflies');
for(let i=0;i<15;i++){
  const f = document.createElement('div');
  f.className='firefly';
  const sz = Math.random()*4+2;
  f.style.cssText = `
    left:${Math.random()*90}%;
    bottom:${Math.random()*40+5}%;
    width:${sz}px;
    height:${sz}px;
    --dur:${(Math.random()*4+4).toFixed(1)}s;
    --del:${(Math.random()*5).toFixed(1)}s;
    --tx:${(Math.random()*80-40).toFixed(0)}px;
    --ty:${(Math.random()*-60-20).toFixed(0)}px;
  `;
  ffEl.appendChild(f);
}

// Generate floating hearts
const bubblesEl = document.getElementById('bubbles');
const colors = ['#ff6b8a','#ff4575','#ff8fa3','#ffb3c6','#ff1744','#e91e63','#f06292','#ffa0b4'];
const heartPath = 'M23.6 2c-3.363 0-6.258 2.736-7.599 5.594-1.342-2.858-4.237-5.594-7.601-5.594-4.637 0-8.4 3.764-8.4 8.401 0 9.433 9.516 11.906 16.001 21.232 6.13-9.268 15.999-12.1 15.999-21.232 0-4.637-3.763-8.401-8.4-8.401z';

for(let i=0;i<22;i++){
  const b = document.createElement('div');
  b.className='bubble';
  const sz = (Math.random()*3+1.5).toFixed(1);
  const col = colors[Math.floor(Math.random()*colors.length)];
  const drift = (Math.random()*100-50).toFixed(0);
  b.style.cssText = `
    left:${Math.random()*100}%;
    --size:${sz}vmin;
    --col:${col};
    --duration:${(Math.random()*6+6).toFixed(1)}s;
    --delay:${(Math.random()*8).toFixed(1)}s;
    --drift:${drift}px;
  `;
  b.innerHTML = `<svg class="heart" viewBox="0 0 32 32"><title>heart</title><path d="${heartPath}"/></svg>`;
  bubblesEl.appendChild(b);
}

// Fade in scene
setTimeout(()=>{
  document.querySelector('.flowers').style.transition='opacity 2s';
},100);
</script>
</body>
</html>
