<!DOCTYPE html>
<html lang="en">
<head>

<title>GrowWorld</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none}
html,body{width:100%;height:100%;background:#000;overflow:hidden;touch-action:none}
#c{display:block;position:absolute;top:0;left:0;image-rendering:pixelated;outline:none;cursor:crosshair}

.mbtn{position:absolute;border:2px solid rgba(255,255,255,0.3);border-radius:50%;background:rgba(0,0,0,0.4);color:#fff;display:flex;align-items:center;justify-content:center;font-size:18px;pointer-events:all;cursor:pointer;-webkit-tap-highlight-color:transparent;touch-action:none}
.mbtn:active{background:rgba(255,255,255,0.25)}
#b-left{width:52px;height:52px;bottom:68px;left:18px}
#b-right{width:52px;height:52px;bottom:68px;left:84px}
#b-jump{width:60px;height:60px;bottom:72px;right:18px;border-color:rgba(100,255,100,0.5);font-size:13px;font-weight:bold;font-family:monospace}
#b-act{width:52px;height:52px;bottom:72px;right:88px;border-color:rgba(255,180,0,0.5);font-size:20px}
#b-wrench{width:40px;height:40px;bottom:132px;right:28px;border-color:rgba(100,180,255,0.5);font-size:18px}
/* World popup */
#wpop{display:none;position:fixed;inset:0;background:rgba(0,0,30,0.93);z-index:200;flex-direction:column;align-items:center;justify-content:center;gap:14px;font-family:monospace}
#wpop.show{display:flex}
#wpop h2{color:#7df;font-size:22px;text-shadow:0 0 16px #09f;margin-bottom:4px}
.wbtn{background:linear-gradient(180deg,rgba(0,90,200,0.8),rgba(0,60,160,0.8));border:2px solid #4af;color:#cef;font:bold 14px monospace;padding:11px 0;border-radius:8px;cursor:pointer;width:240px;text-align:center;transition:background .15s}
.wbtn:hover,.wbtn:active{background:linear-gradient(180deg,rgba(0,120,255,0.9),rgba(0,90,200,0.9))}
#wpop-close{color:#fff;font:bold 14px monospace;cursor:pointer;margin-top:8px;background:rgba(180,20,20,0.7);border:2px solid rgba(255,80,80,0.6);padding:10px 40px;border-radius:8px;}
/* Tooltip */
#tooltip{position:fixed;top:50%;left:50%;transform:translate(-50%,-120%);background:rgba(0,0,0,0.8);color:#ffd;font:11px monospace;padding:4px 10px;border-radius:4px;border:1px solid rgba(255,200,0,0.4);pointer-events:none;white-space:nowrap;display:none}

<script>
// ═══════════════════════════════════════════════════════════════
//  GROWWORLD  —  Faithful Growtopia clone
//  Based on GTServer-main source code structure
// ═══════════════════════════════════════════════════════════════

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let VW = window.innerWidth, VH = window.innerHeight;
canvas.width = VW; canvas.height = VH;
window.addEventListener('resize', () => {
  VW = window.innerWidth; VH = window.innerHeight;
  canvas.width = VW; canvas.height = VH;
});

// ── TRUE Growtopia world dimensions (from world.h) ─────────────
const WORLD_W = 100, WORLD_H = 60;
const TS = 32; // tile size

// ── Item IDs  (matching real Growtopia item IDs) ───────────────
const ITEM = {
  FIST:0, WRENCH:2, DIRT:2, ROCK:10, LAVA:0x04, CAVE_BG:14,
  MAIN_DOOR:6, BEDROCK:8, SAND:16, WOOD:18, LEAF:20,
  DOOR:12, SEED_DIRT:3, SEED_WOOD:19, SEED_ROCK:11,
  GEMS:4, SIGN:32,
};
// Simplified IDs for our engine
const T = {
  AIR:0,DIRT:1,GRAS:2,ROCK:3,BED:4,SAND:5,WOOD:6,LEAF:7,LAVA:8,
  MAIN_DOOR:9,DOOR:10,SIGN:11,CAVE_BG:12,PLATFORM:13,
};
const TILE_NAME=['Air','Dirt','Grass','Rock','Bedrock','Sand','Wood','Leaf','Lava','Main Door','Door','Sign','Cave Bg','Platform'];

// Item IDs in inventory
const I = {
  FIST:0,DIRT:1,DSEED:2,ROCK:3,RSEED:4,SAND:5,WOOD:6,WSEED:7,
  LAVA:8,DOOR:9,SIGN:10,GEMS:11,WRENCH:12,PLATFORM:13,
};
const INAME=['Fist','Dirt','Dirt Seed','Rock','Rock Seed','Sand','Wood','Wood Seed','Lava','Door','Sign','Gems','Wrench','Platform'];

// ── From item_info.h: break_hits = raw/6, grow_time in seconds ─
// Grow time from actual GTServer item database
const GROW_TIME = { [I.DSEED]:3600, [I.RSEED]:7200, [I.WSEED]:1800 }; // seconds
const BREAK_HITS = { [T.DIRT]:3,[T.GRAS]:2,[T.ROCK]:6,[T.BED]:Infinity,[T.SAND]:4,[T.WOOD]:5,[T.LEAF]:1,[T.LAVA]:Infinity,[T.MAIN_DOOR]:Infinity,[T.DOOR]:5,[T.SIGN]:3,[T.PLATFORM]:4 };
const RESET_TIME = { [T.DIRT]:5000,[T.ROCK]:30000,[T.WOOD]:20000 }; // ms

// ── Physics (from character_state / movement packets) ──────────
const GRAV = 0.55, MAX_FALL = 16, JUMP_V = -12, WSPD = 3.8, REACH = TS * 6;

// ════════════════════════════════════════════════════════════════
//  TEXTURE SYSTEM  (OffscreenCanvas pixel art)
// ════════════════════════════════════════════════════════════════
const mktex = (fn) => { const o = new OffscreenCanvas(TS,TS); fn(o.getContext('2d')); return o; };
const r = (c,x,y,w,h,col) => { c.fillStyle=col; c.fillRect(x,y,w,h); };

// Helper: noise pattern
function noiseRect(c, col1, col2, count) {
  for (let i = 0; i < count; i++) {
    const x = (i * 7.3 | 0) % TS, y = (i * 11.7 | 0) % TS;
    const w = 2 + (i * 3.1 | 0) % 3, h = 2 + (i * 4.7 | 0) % 3;
    r(c, x, y, w, h, i % 2 === 0 ? col1 : col2);
  }
}

const TX = {};
TX[T.DIRT] = mktex(c => {
  r(c,0,0,TS,TS,'#7B4F2C');
  noiseRect(c,'#6B3F1E','#8B5F3C',14);
  r(c,11,6,5,5,'#9B7050'); r(c,21,20,4,4,'#9B7050'); // pebbles

  r(c,0,TS-1,TS,1,'rgba(0,0,0,.34)'); r(c,TS-1,0,1,TS,'rgba(0,0,0,.22)');
});
TX[T.GRAS] = mktex(c => {

  for (let bx=1;bx<TS;bx+=3) r(c,bx,0,2,3+Math.abs((Math.sin(bx))*2|0),'#5FD43A');
  r(c,0,7,2,5,'#2A7A18'); r(c,TS-2,6,2,5,'#2A7A18');
  r(c,0,0,TS,1,'rgba(255,255,255,.28)'); r(c,0,0,1,TS,'rgba(255,255,255,.14)');
  r(c,0,TS-1,TS,1,'rgba(0,0,0,.3)'); r(c,TS-1,0,1,TS,'rgba(0,0,0,.2)');
});
TX[T.ROCK] = mktex(c => {
  r(c,0,0,TS,TS,'#6E6E6E');
  noiseRect(c,'#5A5A5A','#7C7C7C',12);
  c.strokeStyle='#4A4A4A'; c.lineWidth=1;
  c.beginPath();c.moveTo(7,4);c.lineTo(13,16);c.lineTo(7,24);c.stroke();
  c.beginPath();c.moveTo(20,6);c.lineTo(24,20);c.stroke();
  c.beginPath();c.moveTo(13,16);c.lineTo(5,20);c.stroke();
  r(c,0,0,TS,1,'rgba(255,255,255,.22)'); r(c,0,0,1,TS,'rgba(255,255,255,.14)');

TX[T.BED] = mktex(c => {

TX[T.SAND] = mktex(c => {

TX[T.WOOD] = mktex(c => {

TX[T.LEAF] = mktex(c => {
  r(c,0,0,TS,TS,'#2D7A1F');
  noiseRect(c,'#3A9A28','#1F6015',10);
  r(c,0,0,TS,1,'rgba(255,255,255,.18)'); r(c,0,TS-1,TS,1,'rgba(0,0,0,.34)');
});
TX[T.LAVA] = mktex(c => {
  r(c,0,0,TS,TS,'#B71C1C');

  c.strokeStyle='rgba(255,220,0,.4)'; c.lineWidth=1;
  c.beginPath();c.moveTo(0,9);c.bezierCurveTo(8,5,16,14,TS,8);c.stroke();
  c.beginPath();c.moveTo(0,22);c.bezierCurveTo(10,18,20,28,TS,20);c.stroke();
  r(c,0,0,TS,2,'rgba(255,150,0,.4)'); r(c,0,TS-1,TS,1,'rgba(0,0,0,.5)');
});
TX[T.MAIN_DOOR] = mktex(c => {
  r(c,0,0,TS,TS,'#5D4037');
  r(c,2,0,TS-4,TS,'#795548');
  r(c,4,2,TS-8,TS-4,'#6D4C41');
  r(c,5,3,10,12,'#5D4037'); r(c,17,3,10,12,'#5D4037');
  r(c,5,18,10,11,'#5D4037'); r(c,17,18,10,11,'#5D4037');
  r(c,13,13,6,5,'#FFD600'); // handle
  c.strokeStyle='rgba(0,255,180,.8)'; c.lineWidth=2;
  c.strokeRect(1,1,TS-2,TS-2);
  r(c,0,0,TS,1,'rgba(255,255,255,.2)');
});
TX[T.DOOR] = mktex(c => {
  r(c,0,0,TS,TS,'#5D4037');
  r(c,2,0,TS-4,TS,'#8D6E63');
  r(c,4,2,TS-8,TS-4,'#6D4C41');
  r(c,5,3,10,12,'#5D4037'); r(c,17,3,10,12,'#5D4037');
  r(c,5,18,10,11,'#5D4037'); r(c,17,18,10,11,'#5D4037');
  r(c,13,13,6,5,'#FFD600');
  c.strokeStyle='rgba(0,180,255,.7)'; c.lineWidth=1.5;
  c.strokeRect(1,1,TS-2,TS-2);
  r(c,0,0,TS,1,'rgba(255,255,255,.18)');
});
TX[T.SIGN] = mktex(c => {
  r(c,0,0,TS,TS,'#A0826D');
  r(c,2,2,TS-4,TS-8,'#D7CCC8');
  r(c,TS/2-1,TS-6,2,8,'#8D6E63'); // post
  c.strokeStyle='#795548'; c.lineWidth=1.5;
  c.strokeRect(2,2,TS-4,TS-8);
  r(c,5,6,TS-10,2,'#795548');
  r(c,5,12,TS-10,2,'#795548');
  r(c,0,0,TS,1,'rgba(255,255,255,.2)');
});
TX[T.CAVE_BG] = mktex(c => {
  r(c,0,0,TS,TS,'#1a1208');
  noiseRect(c,'#221A10','#120E06',8);
});
TX[T.PLATFORM] = mktex(c => {
  r(c,0,0,TS,8,'#8B5E3C');
  for (let y=0;y<8;y+=2) r(c,0,y,TS,1,'rgba(0,0,0,.15)');
  r(c,0,0,TS,1,'rgba(255,255,255,.25)');
});

// Background tile (behind world)
const TX_SKY_DIRT = mktex(c => { r(c,0,0,TS,TS,'#1a1208'); });

// Crack overlays
const mkcrack = (lvl) => {
  const o = new OffscreenCanvas(TS,TS), c = o.getContext('2d');
  c.strokeStyle='rgba(0,0,0,.88)'; c.lineWidth=1.5;
  if(lvl>=1){c.beginPath();c.moveTo(10,4);c.lineTo(16,14);c.lineTo(11,27);c.stroke();c.beginPath();c.moveTo(16,14);c.lineTo(6,21);c.stroke();}
  if(lvl>=2){c.beginPath();c.moveTo(22,3);c.lineTo(19,14);c.lineTo(26,27);c.stroke();c.beginPath();c.moveTo(19,14);c.lineTo(28,20);c.stroke();}
  if(lvl>=3){c.fillStyle='rgba(0,0,0,.3)';c.beginPath();c.moveTo(10,4);c.lineTo(16,14);c.lineTo(6,21);c.closePath();c.fill();c.beginPath();c.moveTo(22,3);c.lineTo(19,14);c.lineTo(28,20);c.closePath();c.fill();c.lineWidth=1;c.beginPath();c.moveTo(3,15);c.lineTo(10,14);c.lineTo(5,28);c.stroke();c.beginPath();c.moveTo(28,5);c.lineTo(23,18);c.stroke();}
  return o;
};
const CRK = [mkcrack(1), mkcrack(2), mkcrack(3)];

// ── Icons 22×22 ────────────────────────────────────────────────
const mkicon = (fn) => { const o=new OffscreenCanvas(22,22); fn(o.getContext('2d')); return o; };
const ic = {};
ic[I.FIST]=mkicon(c=>{r(c,5,1,12,4,'#5D4037');r(c,4,5,14,10,'#FFA726');r(c,4,15,6,5,'#FF8F00');r(c,10,13,5,7,'#FFA726');for(let i=4;i<16;i+=2)r(c,i,5,1,2,'rgba(0,0,0,.25)');r(c,4,5,14,1,'rgba(255,255,255,.3)');});
ic[I.DIRT]=mkicon(c=>{c.drawImage(TX[T.DIRT],0,0,TS,TS,0,0,22,22);});
ic[I.DSEED]=mkicon(c=>{r(c,8,11,6,7,'#8B6914');r(c,7,10,8,2,'#A67C20');r(c,10,4,2,8,'#4CAF50');r(c,5,5,6,2,'#66BB6A');r(c,12,4,6,2,'#66BB6A');r(c,8,11,6,1,'rgba(255,255,255,.3)');});
ic[I.ROCK]=mkicon(c=>{c.drawImage(TX[T.ROCK],0,0,TS,TS,0,0,22,22);});
ic[I.RSEED]=mkicon(c=>{r(c,6,10,10,8,'#5A5A5A');r(c,5,9,12,2,'#6E6E6E');r(c,10,3,2,8,'#888');r(c,5,4,6,2,'#999');r(c,12,3,6,2,'#888');});
ic[I.SAND]=mkicon(c=>{c.drawImage(TX[T.SAND],0,0,TS,TS,0,0,22,22);});
ic[I.WOOD]=mkicon(c=>{c.drawImage(TX[T.WOOD],0,0,TS,TS,0,0,22,22);});
ic[I.WSEED]=mkicon(c=>{r(c,8,10,6,8,'#8B5E3C');r(c,7,9,8,2,'#A07050');r(c,10,3,2,8,'#4CAF50');r(c,5,4,7,2,'#66BB6A');r(c,12,3,7,2,'#66BB6A');});
ic[I.LAVA]=mkicon(c=>{c.drawImage(TX[T.LAVA],0,0,TS,TS,0,0,22,22);});
ic[I.DOOR]=mkicon(c=>{c.drawImage(TX[T.DOOR],0,0,TS,TS,0,0,22,22);});
ic[I.SIGN]=mkicon(c=>{c.drawImage(TX[T.SIGN],0,0,TS,TS,0,0,22,22);});
ic[I.GEMS]=mkicon(c=>{r(c,5,2,12,2,'#CE93D8');r(c,2,4,18,10,'#AB47BC');r(c,4,6,14,6,'#CE93D8');r(c,7,14,8,6,'#9C27B0');r(c,5,2,4,4,'rgba(255,255,255,.4)');});
ic[I.WRENCH]=mkicon(c=>{r(c,9,1,4,6,'#9E9E9E');r(c,3,5,14,5,'#757575');r(c,4,8,12,10,'#9E9E9E');r(c,5,16,10,5,'#BDBDBD');r(c,9,1,4,1,'rgba(255,255,255,.4)');});

// ════════════════════════════════════════════════════════════════
//  WORLD SYSTEM  (based on World::generate() logic)
// ════════════════════════════════════════════════════════════════
// From world.cpp: dirt_layer {24,52}, lava_layer=47, bedrock=51
const DIRT_START = 24, DIRT_END = 52, LAVA_LAYER = 47, BED_LAYER = 51;

function mkCell(type) {
  const mhp = BREAK_HITS[type] || 0;
  return { type, hp: mhp===Infinity?Infinity:mhp, mhp: mhp===Infinity?Infinity:mhp, fg: type, bg: 0 };
}

const worlds = {};
let currentWorld = 'START';
let world = [], wName = 'START';

function genWorld(name) {
  const W = WORLD_W, H = WORLD_H;
  const tiles = [];
  // Faithful to world.cpp: main door at random x, dirt_layer.x row
  const mainDoorX = Math.max(3, Math.min(W-4, 5 + Math.floor(Math.random() * (W-10))));
  const mainDoorY = DIRT_START;

  for (let i = 0; i < W * H; i++) {
    const x = i % W, y = Math.floor(i / W);
    let type = T.AIR, bg = 0;

    if (y > DIRT_START && y < DIRT_END) {
      bg = T.CAVE_BG;
      if (y > LAVA_LAYER && Math.random() < 0.7) {
        type = T.LAVA;
      } else if (y > 28 && Math.random() < 0.05) {
        type = T.ROCK;
      } else {
        type = T.DIRT;
      }
    } else if (y >= BED_LAYER) {
      type = T.BED; bg = T.CAVE_BG;
    } else if (y === DIRT_START) {
      // Surface row: grass
      type = T.GRAS;
    }

    // Main door position (from world.cpp)
    if (x === mainDoorX && y === mainDoorY) {
      type = T.MAIN_DOOR; bg = T.CAVE_BG;
    }
    if (x === mainDoorX && y === mainDoorY + 1) {
      type = T.BED;
    }

    const mhp = BREAK_HITS[type];
    tiles.push({
      type, bg,
      hp: mhp===Infinity?Infinity:mhp,
      mhp: mhp===Infinity?Infinity:mhp,
      resetTimer: 0
    });
  }

  // Add some sand near surface sides
  for (let c=2;c<12;c++) {
    const cell=tiles[DIRT_START*W+c];
    if(cell&&cell.type===T.GRAS){cell.type=T.SAND;const mh=BREAK_HITS[T.SAND];cell.hp=mh;cell.mhp=mh;}
    const c2=tiles[(DIRT_START+1)*W+c];
    if(c2&&c2.type===T.DIRT){c2.type=T.SAND;const mh=BREAK_HITS[T.SAND];c2.hp=mh;c2.mhp=mh;}
  }

  return { tiles, w: W, h: H, mainDoorX, mainDoorY, name };
}

function cellAt(r, c, wdata) {
  const wd = wdata || world;
  const WD = wd.w || WORLD_W;
  if (r < 0 || r >= (wd.h||WORLD_H) || c < 0 || c >= WD) return null;
  return wd.tiles[r * WD + c];
}

function isSolid(r, c, wdata) {
  const cell = cellAt(r, c, wdata);
  if (!cell) return false;
  if (cell.type === T.AIR || cell.type === T.LAVA || cell.type === T.CAVE_BG) return false;
  if (cell.type === T.PLATFORM) return true; // platform: solid from top only
  return true;
}

function isPlatformOnly(r, c, wdata) {
  const cell = cellAt(r, c, wdata);
  return cell && cell.type === T.PLATFORM;
}

function loadWorld(name) {
  // Save current
  if (world.tiles) worlds[wName] = world;
  wName = name;
  if (!worlds[name]) worlds[name] = genWorld(name);
  world = worlds[name];
  trees.length = 0; drops.length = 0;
  // Respawn at main door
  const mx = world.mainDoorX, my = world.mainDoorY;
  player.x = mx * TS + 4;
  player.y = (my - 2) * TS;
  player.vx = 0; player.vy = 0;
}

function initGame() {
  loadWorld('START');
}

// ════════════════════════════════════════════════════════════════
//  TREES / PLANTS  (grow_time from item_info.h)
// ════════════════════════════════════════════════════════════════
const trees = [];

// From item_info: grow_time is in seconds
// We'll use accelerated time for fun (÷100)
const GROW_STAGES = [
  { ms: 2000, label: 'Seedling' },
  { ms: 4000, label: 'Sapling' },
  { ms: 6000, label: 'Mature' },
];

function plantSeed(col, row, seedId) {
  const cell = cellAt(row, col);
  if (!cell || cell.type !== T.AIR) return false;
  const below = cellAt(row+1, col);
  if (!below || below.type === T.AIR || below.type === T.CAVE_BG || below.type === T.LAVA) return false;
  if (trees.find(t=>t.col===col&&t.row===row&&t.world===wName)) return false;
  let ptype = 'dirt';
  if (seedId===I.WSEED) ptype='wood';
  if (seedId===I.RSEED) ptype='rock';
  trees.push({ col, row, stage:0, elapsed:0, ptype, world:wName });
  return true;
}

function updateTrees(dt) {
  for (const t of trees) {
    if (t.world !== wName) continue;
    if (t.stage < 2) {
      t.elapsed += dt;
      if (t.elapsed >= GROW_STAGES[t.stage].ms) { t.stage++; t.elapsed=0; }
    }
  }
}

function getTreeDrops(ptype) {
  if (ptype==='dirt') return [[I.DIRT,1],[I.DSEED,1+(Math.random()<.5?1:0)]];
  if (ptype==='wood') return [[I.WOOD,2],[I.WSEED,1]];
  if (ptype==='rock') return [[I.ROCK,1],[I.RSEED,1]];
  return [];
}

function tryHitTree(wr, wc) {
  for (let i=trees.length-1;i>=0;i--) {
    const t=trees[i];
    if (t.world!==wName||t.stage!==2) continue;
    let hit=false;
    if (wc===t.col&&wr>=t.row-2&&wr<=t.row) hit=true;
    if (hit) {
      getTreeDrops(t.ptype).forEach(([it,q])=>spawnDrop(t.col*TS+TS/2,t.row*TS,it,q));
      trees.splice(i,1); return true;
    }
  }
  return false;
}

// ════════════════════════════════════════════════════════════════
//  DROPPED ITEMS  (inventory pickup system)
// ════════════════════════════════════════════════════════════════
const drops = [];
function spawnDrop(wx, wy, itype, qty=1) {
  drops.push({
    x:wx, y:wy, vx:(Math.random()-.5)*4, vy:-5-Math.random()*3,
    itype, qty, grounded:false, ft:Math.random()*6.28, alpha:1, dying:false, dyT:0, world:wName
  });
}

function updateDrops() {
  const pcx=player.x+player.w/2, pcy=player.y+player.h/2;
  for (let i=drops.length-1;i>=0;i--) {
    const d=drops[i];
    if (d.world!==wName) continue;
    if (d.dying) {
      d.dyT+=.12; d.alpha=1-d.dyT;
      d.x+=(pcx-d.x)*.25; d.y+=(pcy-d.y)*.25;
      if (d.dyT>=1) drops.splice(i,1); continue;
    }
    if (!d.grounded) {
      d.vy+=GRAV*.7; if(d.vy>MAX_FALL)d.vy=MAX_FALL;
      d.x+=d.vx; d.y+=d.vy; d.vx*=.96;
      const gr=Math.floor((d.y+8)/TS), gc=Math.floor(d.x/TS);
      if (isSolid(gr,gc)) {
        d.y=gr*TS-8; d.vy*=-.4;
        if (Math.abs(d.vy)<1) { d.vy=0; d.vx*=.5; d.grounded=true; }
      }
      if(d.x<0){d.x=0;d.vx*=-1;} if(d.x>WORLD_W*TS){d.x=WORLD_W*TS-8;d.vx*=-1;}
      if(d.y>WORLD_H*TS){d.grounded=true;d.y=WORLD_H*TS-10;}
    } else {
      d.ft+=.034;
      const dx=pcx-d.x, dy=pcy-d.y, dist=Math.hypot(dx,dy);
      if(dist<120){d.grounded=false;d.vx+=dx/dist*1.8;d.vy+=dy/dist*1.8;}
    }
    if (Math.hypot(pcx-d.x,pcy-d.y)<36) { addItem(d.itype,d.qty); d.dying=true; }
  }
}

function addItem(itype, qty) {

function respawnPlayer() {

// ════════════════════════════════════════════════════════════════
//  BREAK / PLACE SYSTEM  (OnTileChangeRequest logic)
// ════════════════════════════════════════════════════════════════
const BREAK_INTERVAL = 15; // frames between hits
let bs = { r:-1, c:-1, cd:0 };

function getTileDrops(type) {
  switch(type) {
    case T.DIRT: return [[I.DIRT,1],...(Math.random()<.4?[[I.DSEED,1]]:[] )];
    case T.GRAS: return [[I.DIRT,1],...(Math.random()<.5?[[I.DSEED,1]]:[] )];
    case T.ROCK: return [[I.ROCK,1],...(Math.random()<.2?[[I.RSEED,1]]:[] )];
    case T.SAND: return [[I.SAND,1]];
    case T.WOOD: return [[I.WOOD,2],...(Math.random()<.4?[[I.WSEED,1]]:[] )];
    case T.LEAF: return [];
    case T.LAVA: return [[I.LAVA,1]];
    case T.DOOR: return [[I.DOOR,1]];
    case T.SIGN: return [[I.SIGN,1]];
    case T.PLATFORM: return [[I.PLATFORM,1]];
    default: return [];
  }
}

function tilePartCol(t) {
  return {[T.DIRT]:'#7B4F2C',[T.GRAS]:'#3A8C1F',[T.ROCK]:'#6E6E6E',[T.SAND]:'#C8A870',
          [T.WOOD]:'#8B5E3C',[T.LEAF]:'#2D7A1F',[T.LAVA]:'#FF5722',[T.DOOR]:'#8D6E63',
          [T.SIGN]:'#A0826D',[T.PLATFORM]:'#8B5E3C'}[t]||'#888';
}

function doBreakTile(wr, wc) {
  const cell = cellAt(wr, wc);
  if (!cell || cell.type===T.AIR || cell.type===T.CAVE_BG) return;
  if (cell.mhp===Infinity) return; // bedrock, lava unbreakable
  if (bs.r!==wr||bs.c!==wc) bs={r:wr,c:wc,cd:0};
  player.punchT=14; player.facing=mouse.wx<player.x+player.w/2?-1:1;
  bs.cd--;
  if (bs.cd<=0) {
    bs.cd=BREAK_INTERVAL;
    cell.hp--;
    spawnParts(wc*TS+TS/2,wr*TS+TS/2,tilePartCol(cell.type),6);
    if (cell.hp<=0) {
      getTileDrops(cell.type).forEach(([it,q])=>spawnDrop(wc*TS+TS/2,wr*TS,it,q));
      // From tile reset_time: tile respawns after time
      const resetMs = RESET_TIME[cell.type];
      cell.type=T.AIR; cell.hp=0; cell.mhp=0;
      if (resetMs) {
        cell._resetType = cell.type; // save for respawn (simplified)
      }
      bs={r:-1,c:-1,cd:0};
    }
  }
}

function doPlaceTile(wr, wc) {
  const cell = cellAt(wr, wc);
  if (!cell || cell.type!==T.AIR) return;
  const cur = player.cur;
  if (cur.qty<=0) return;
  const tmap = {[I.DIRT]:T.DIRT,[I.ROCK]:T.ROCK,[I.SAND]:T.SAND,[I.WOOD]:T.WOOD,
                [I.LAVA]:T.LAVA,[I.DOOR]:T.DOOR,[I.SIGN]:T.SIGN,[I.PLATFORM]:T.PLATFORM};
  const ttype = tmap[cur.id];
  if (ttype===undefined) return;
  // Prevent placing in player body
  const px2=wc*TS,py2=wr*TS;
  if(px2<player.x+player.w&&px2+TS>player.x&&py2<player.y+player.h&&py2+TS>player.y) return;
  const mhp=BREAK_HITS[ttype];
  cell.type=ttype; cell.hp=mhp===Infinity?Infinity:mhp; cell.mhp=cell.hp;
  cur.qty--; player.punchT=10; player.facing=mouse.wx<player.x+player.w/2?-1:1;
}

function handleInteract() {
  const wr=mouse.wy/TS|0, wc=mouse.wx/TS|0;
  const pcx=player.x+player.w/2, pcy=player.y+player.h/2;
  const dist=Math.hypot(pcx-(wc*TS+TS/2),pcy-(wr*TS+TS/2));
  if (dist>REACH) { bs={r:-1,c:-1,cd:0}; return; }
  const cur=player.cur;

  // Seeds → plant
  if ((cur.id===I.DSEED||cur.id===I.RSEED||cur.id===I.WSEED)&&mouse.just) {
    if(cur.qty>0&&plantSeed(wc,wr,cur.id)){cur.qty--;} return;
  }

  const cell=cellAt(wr,wc);
  if (cell&&cell.type!==T.AIR&&cell.type!==T.CAVE_BG) {
    // Wrench → open door/sign dialog
    if (cur.id===I.WRENCH && mouse.just) {
      if(cell.type===T.MAIN_DOOR||cell.type===T.DOOR) { openPortal(); return; }
      if(cell.type===T.SIGN) { showTooltip('📝 This is a sign!'); return; }
    }
    if(tryHitTree(wr,wc)){player.punchT=14;return;}
    doBreakTile(wr,wc);
  } else {
    if(!tryHitTree(wr,wc)&&cur.id!==I.FIST&&cur.id!==I.WRENCH&&cur.id!==I.DSEED&&cur.id!==I.RSEED&&cur.id!==I.WSEED) {
      doPlaceTile(wr,wc);
    }
    bs={r:-1,c:-1,cd:0};
  }
}

// ════════════════════════════════════════════════════════════════
//  PHYSICS  (OnMovement handler)
// ════════════════════════════════════════════════════════════════
function updatePlayer(){
  let dx=0;
  if(K['KeyA']||K['ArrowLeft']||MK.left) dx=-1;
  if(K['KeyD']||K['ArrowRight']||MK.right) dx=1;
  if(dx) player.facing=dx;
  player.vx=dx*WSPD;

  if((K['Space']||K['KeyW']||K['ArrowUp']||MK.up)&&player.onGround){player.vy=JUMP_V;player.onGround=false;}
  if(player.onGround&&Math.abs(player.vx)>.1) player.walkT+=.12;
  if(player.punchT>0) player.punchT--;

  player.vy+=GRAV; if(player.vy>MAX_FALL)player.vy=MAX_FALL;

  // Horizontal
  player.x+=player.vx;
  let l=player.x/TS|0,ri=(player.x+player.w-1)/TS|0;
  let t=player.y/TS|0,b=(player.y+player.h-1)/TS|0;
  for(let row=t;row<=b;row++){
    if(player.vx>0&&isSolid(row,ri)){player.x=ri*TS-player.w;player.vx=0;}
    if(player.vx<0&&isSolid(row,l)){player.x=(l+1)*TS;player.vx=0;}
  }
  player.x=Math.max(0,Math.min(player.x,WORLD_W*TS-player.w));

  // Vertical
  player.y+=player.vy;
  player.onGround=false;
  l=player.x/TS|0; ri=(player.x+player.w-1)/TS|0;
  t=player.y/TS|0; b=(player.y+player.h-1)/TS|0;
  for(let col=l;col<=ri;col++){
    if(player.vy>0&&isSolid(b,col)){
      if(isPlatformOnly(b,col)&&player.vy<0) continue; // pass through platform when jumping up
      player.y=b*TS-player.h; player.vy=0; player.onGround=true;
    }
    if(player.vy<0&&isSolid(t,col)&&!isPlatformOnly(t,col)){player.y=(t+1)*TS;player.vy=0;}
  }
  player.y=Math.max(0,Math.min(player.y,WORLD_H*TS-player.h));

  // Lava = respawn (from server death logic)
  const midC=Math.floor((player.x+player.w/2)/TS);
  const footR=Math.floor((player.y+player.h+2)/TS);
  const underCell=cellAt(footR,midC);
  if(underCell&&underCell.type===T.LAVA) { respawnPlayer(); showTooltip('💀 You touched lava! Respawned.'); }
}

// ════════════════════════════════════════════════════════════════
//  DRAW
// ════════════════════════════════════════════════════════════════
let glowT=0;

function drawBG(){
  // Sky below DIRT_START row
  const skyY=Math.max(0,DIRT_START*TS-cam.y);
  if(skyY>0){
    const g=ctx.createLinearGradient(0,0,0,skyY);
    g.addColorStop(0,'#5BC8F5');g.addColorStop(.7,'#A8DFF7');g.addColorStop(1,'#CBF0FF');
    ctx.fillStyle=g; ctx.fillRect(0,0,VW,skyY);
  }
  // Underground fill
  if(skyY<VH){
    ctx.fillStyle='#1a1208'; ctx.fillRect(0,skyY,VW,VH-skyY);
  }
  // Sun (only if sky visible)
  if(skyY>40){
    const sx=VW*.84,sy=Math.min(skyY-30,55);
    ctx.fillStyle='#FFF9C4';ctx.beginPath();ctx.arc(sx,sy,26,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#FFF176';ctx.beginPath();ctx.arc(sx,sy,20,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='rgba(255,240,80,.4)';ctx.lineWidth=2;
    for(let a=0;a<Math.PI*2;a+=Math.PI/6){ctx.beginPath();ctx.moveTo(sx+Math.cos(a)*28,sy+Math.sin(a)*28);ctx.lineTo(sx+Math.cos(a)*38,sy+Math.sin(a)*38);ctx.stroke();}
    // Clouds
    for(const cl of clouds){
      const cx=cl.x-cam.x*.28,cy=cl.y-cam.y*.06;
      if(cy<-30||cy>skyY+30||cx<-cl.w-20||cx>VW+20)continue;
      ctx.fillStyle='rgba(255,255,255,.92)';
      ctx.beginPath();ctx.ellipse(cx,cy,cl.w/2,cl.h/2,0,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.ellipse(cx-cl.w*.22,cy+cl.h*.1,cl.w*.36,cl.h*.4,0,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.ellipse(cx+cl.w*.24,cy+cl.h*.12,cl.w*.38,cl.h*.4,0,0,Math.PI*2);ctx.fill();
    }
  }
}

function drawWorld(){
  const sc=Math.max(0,(cam.x/TS|0)-1), ec=Math.min(sc+Math.ceil(VW/TS)+3,WORLD_W);
  const sr=Math.max(0,(cam.y/TS|0)-1), er=Math.min(sr+Math.ceil(VH/TS)+3,WORLD_H);
  for(let row=sr;row<er;row++){
    for(let col=sc;col<ec;col++){
      const cell=world.tiles[row*WORLD_W+col];
      if(!cell) continue;
      const sx=col*TS-cam.x, sy=row*TS-cam.y;

      // Background tile
      if(cell.bg&&TX[cell.bg]&&cell.type===T.AIR){
        ctx.drawImage(TX[cell.bg],sx,sy); continue;
      }
      if(cell.type===T.AIR){ continue; }

      // Lava: animated
      if(cell.type===T.LAVA){
        const pulse=.75+Math.sin(glowT+col*.6+row*.4)*.25;
        ctx.save();ctx.globalAlpha=pulse;
        ctx.drawImage(TX[T.LAVA],sx,sy);
        ctx.restore();
        ctx.save();ctx.globalAlpha=.25+Math.sin(glowT*1.3+col+row)*.1;
        const rg=ctx.createRadialGradient(sx+TS/2,sy+TS/2,0,sx+TS/2,sy+TS/2,TS);
        rg.addColorStop(0,'rgba(255,140,0,.5)');rg.addColorStop(1,'rgba(255,60,0,0)');
        ctx.fillStyle=rg;ctx.fillRect(sx-4,sy-4,TS+8,TS+8);
        ctx.restore();
        continue;
      }

      // Draw tile texture
      if(TX[cell.type]) ctx.drawImage(TX[cell.type],sx,sy);
      else{ctx.fillStyle='#888';ctx.fillRect(sx,sy,TS,TS);}

      // Background behind on cave tiles
      if(cell.bg&&TX[cell.bg]&&cell.type!==T.CAVE_BG){
        ctx.save();ctx.globalAlpha=.35;ctx.drawImage(TX[cell.bg],sx,sy);ctx.restore();
      }

      // Door glow
      if(cell.type===T.MAIN_DOOR||cell.type===T.DOOR){
        ctx.save();ctx.globalAlpha=.4+Math.sin(glowT*2+col)*.2;
        ctx.strokeStyle=cell.type===T.MAIN_DOOR?'rgba(0,255,180,.8)':'rgba(0,180,255,.7)';
        ctx.lineWidth=2;ctx.strokeRect(sx+1,sy+1,TS-2,TS-2);
        ctx.restore();
      }

      // Crack
      if(cell.mhp>1&&cell.mhp!==Infinity&&cell.hp<cell.mhp){
        const lvl=Math.min(2,Math.floor((1-cell.hp/cell.mhp)*3));
        if(lvl>=0) ctx.drawImage(CRK[lvl],sx,sy);
      }
    }
  }
}

function drawTrees(){
  const activeTrees = trees.filter(t=>t.world===wName);
  for(const t of activeTrees){
    const sx=t.col*TS-cam.x, sy=t.row*TS-cam.y;
    if(sx<-TS*5||sx>VW+TS*5) continue;

    if(t.ptype==='dirt'){
      if(t.stage===0){
        // Seedling
        ctx.fillStyle='#5D4037';ctx.fillRect(sx+14,sy-6,4,10);
        ctx.fillStyle='#66BB6A';ctx.beginPath();ctx.ellipse(sx+16,sy-11,8,6,0,0,Math.PI*2);ctx.fill();
        ctx.fillStyle='#81C784';ctx.beginPath();ctx.ellipse(sx+16,sy-13,4,4,0,0,Math.PI*2);ctx.fill();
      } else if(t.stage===1){
        // Sapling
        ctx.fillStyle='#5D4037';ctx.fillRect(sx+12,sy-TS+4,8,TS);
        ctx.fillStyle='#33691E';ctx.beginPath();ctx.ellipse(sx+16,sy-TS-4,22,18,0,0,Math.PI*2);ctx.fill();
        ctx.fillStyle='#7CB342';ctx.beginPath();ctx.ellipse(sx+16,sy-TS+5,18,13,0,0,Math.PI*2);ctx.fill();
      } else {
        // Mature dirt tree (Growtopia classic look)
        ctx.fillStyle='#4E342E';
        ctx.beginPath();ctx.moveTo(sx+11,sy+3);ctx.lineTo(sx+1,sy+10);ctx.lineTo(sx+8,sy+1);ctx.fill();
        ctx.beginPath();ctx.moveTo(sx+21,sy+3);ctx.lineTo(sx+31,sy+10);ctx.lineTo(sx+24,sy+1);ctx.fill();
        ctx.fillStyle='#6D4C41';ctx.fillRect(sx+10,sy-TS*2+6,12,TS*2+2);
        ctx.fillStyle='#8D6E63';ctx.fillRect(sx+13,sy-TS*2+6,3,TS*2);
        ctx.fillStyle='#4E342E';ctx.fillRect(sx+10,sy-TS*2+6,2,TS*2);
        // Canopy
        ctx.fillStyle='#1B5E20';ctx.beginPath();ctx.ellipse(sx+16,sy-TS*2-2,32,26,0,0,Math.PI*2);ctx.fill();
        ctx.fillStyle='#2E7D32';
        ctx.beginPath();ctx.ellipse(sx+6,sy-TS*2+6,24,20,0,0,Math.PI*2);ctx.fill();
        ctx.beginPath();ctx.ellipse(sx+26,sy-TS*2+6,24,20,0,0,Math.PI*2);ctx.fill();
        ctx.fillStyle='#388E3C';ctx.beginPath();ctx.ellipse(sx+16,sy-TS*2+10,28,18,0,0,Math.PI*2);ctx.fill();
        ctx.fillStyle='#43A047';ctx.beginPath();ctx.ellipse(sx+16,sy-TS*2-6,26,20,0,0,Math.PI*2);ctx.fill();
        ctx.fillStyle='#66BB6A';
        ctx.beginPath();ctx.ellipse(sx+10,sy-TS*2-10,14,10,0,0,Math.PI*2);ctx.fill();
        ctx.beginPath();ctx.ellipse(sx+23,sy-TS*2-10,12,9,0,0,Math.PI*2);ctx.fill();
        // Apples
        [[-12,-7],[6,-14],[18,-3],[-16,-1],[3,5],[-4,-18],[14,-18],[20,-14]].forEach(([ax,ay])=>{
          ctx.fillStyle='#B71C1C';ctx.beginPath();ctx.arc(sx+16+ax,sy-TS*2+ay+5,5.5,0,Math.PI*2);ctx.fill();
          ctx.fillStyle='#EF5350';ctx.beginPath();ctx.arc(sx+16+ax,sy-TS*2+ay+4,3.5,0,Math.PI*2);ctx.fill();
          ctx.fillStyle='rgba(255,255,255,.45)';ctx.beginPath();ctx.arc(sx+16+ax-1,sy-TS*2+ay+2,1.5,0,Math.PI*2);ctx.fill();
          ctx.fillStyle='#4CAF50';ctx.fillRect(sx+16+ax-1,sy-TS*2+ay-1,2,4);
        });
      }
    } else if(t.ptype==='wood'){
      if(t.stage===0){
        ctx.fillStyle='#5D4037';ctx.fillRect(sx+14,sy-8,4,12);
        ctx.fillStyle='#8BC34A';ctx.beginPath();ctx.ellipse(sx+16,sy-12,7,5,0,0,Math.PI*2);ctx.fill();
      } else if(t.stage===1){
        ctx.fillStyle='#5D4037';ctx.fillRect(sx+12,sy-TS+4,8,TS);
        ctx.drawImage(TX[T.WOOD],sx+12,sy-TS*2+4,8,TS*2); // bark texture
        ctx.fillStyle='#558B2F';ctx.beginPath();ctx.ellipse(sx+16,sy-TS-6,20,16,0,0,Math.PI*2);ctx.fill();
        ctx.fillStyle='#8BC34A';ctx.beginPath();ctx.ellipse(sx+16,sy-TS+2,15,12,0,0,Math.PI*2);ctx.fill();
      } else {
        // Mature wood tree (tall, 3 tiles)
        ctx.fillStyle='#4E342E';ctx.fillRect(sx+11,sy-TS*3+4,10,TS*3);
        ctx.drawImage(TX[T.WOOD],sx+11,sy-TS*3+4,10,TS*3);
        ctx.fillStyle='#2E7D32';ctx.beginPath();ctx.ellipse(sx+16,sy-TS*3,28,22,0,0,Math.PI*2);ctx.fill();
        ctx.fillStyle='#388E3C';ctx.beginPath();ctx.ellipse(sx+8,sy-TS*3+8,20,16,0,0,Math.PI*2);ctx.fill();
        ctx.beginPath();ctx.ellipse(sx+24,sy-TS*3+8,20,16,0,0,Math.PI*2);ctx.fill();
        ctx.fillStyle='#4CAF50';ctx.beginPath();ctx.ellipse(sx+16,sy-TS*3+12,22,14,0,0,Math.PI*2);ctx.fill();
        // Wood drops hint
        ctx.fillStyle='rgba(139,94,60,.7)';ctx.fillRect(sx+4,sy-TS*2+8,6,6);ctx.fillRect(sx+22,sy-TS*2+14,6,6);
      }
    } else if(t.ptype==='rock'){
      if(t.stage===0){
        ctx.fillStyle='#616161';ctx.beginPath();ctx.ellipse(sx+16,sy-6,8,6,0,0,Math.PI*2);ctx.fill();
        ctx.fillStyle='#9E9E9E';ctx.beginPath();ctx.ellipse(sx+14,sy-7,4,3,-.3,0,Math.PI*2);ctx.fill();
      } else if(t.stage===1){
        ctx.fillStyle='#616161';ctx.beginPath();ctx.ellipse(sx+16,sy-14,14,12,0,0,Math.PI*2);ctx.fill();
        ctx.fillStyle='#9E9E9E';ctx.beginPath();ctx.ellipse(sx+11,sy-16,8,6,-.2,0,Math.PI*2);ctx.fill();
        ctx.fillStyle='#424242';ctx.beginPath();ctx.ellipse(sx+22,sy-12,6,5,.2,0,Math.PI*2);ctx.fill();
      } else {
        // Rock cluster (mature)
        ctx.fillStyle='#424242';ctx.beginPath();ctx.ellipse(sx+16,sy-22,20,18,0,0,Math.PI*2);ctx.fill();
        ctx.fillStyle='#616161';ctx.beginPath();ctx.ellipse(sx+8,sy-16,14,12,-.3,0,Math.PI*2);ctx.fill();
        ctx.beginPath();ctx.ellipse(sx+24,sy-14,12,11,.3,0,Math.PI*2);ctx.fill();
        ctx.fillStyle='#757575';ctx.beginPath();ctx.ellipse(sx+16,sy-24,16,12,0,0,Math.PI*2);ctx.fill();
        ctx.fillStyle='#9E9E9E';ctx.beginPath();ctx.ellipse(sx+12,sy-26,8,6,-.2,0,Math.PI*2);ctx.fill();
        ctx.fillStyle='rgba(255,255,255,.15)';ctx.beginPath();ctx.ellipse(sx+11,sy-26,5,4,-.4,0,Math.PI*2);ctx.fill();
      }
    }

    // Growth progress bar
    if(t.stage<2){
      const pct=t.elapsed/GROW_STAGES[t.stage].ms;
      ctx.fillStyle='rgba(0,0,0,.55)';ctx.fillRect(sx,sy+TS-6,TS,5);
      ctx.fillStyle=t.ptype==='dirt'?'#76FF03':t.ptype==='wood'?'#FFAB40':'#78909C';
      ctx.fillRect(sx,sy+TS-6,TS*pct,5);
      ctx.fillStyle='rgba(255,255,255,.7)';ctx.font='7px monospace';
      ctx.fillText(GROW_STAGES[t.stage].label,sx+1,sy+TS-8);
    }
  }
}

function drawDrops(){
  for(const d of drops){
    if(d.world!==wName) continue;
    const sx=d.x-cam.x, sy=(d.grounded?d.y+Math.sin(d.ft*2)*3:d.y)-cam.y;
    ctx.save();ctx.globalAlpha=d.alpha;
    if(d.grounded){ctx.fillStyle='rgba(0,0,0,.2)';ctx.beginPath();ctx.ellipse(sx,d.y-cam.y+7,11,3.5,0,0,Math.PI*2);ctx.fill();}
    // Item box (Growtopia style)
    ctx.fillStyle='rgba(18,10,2,.7)';ctx.fillRect(sx-14,sy-14,28,28);
    ctx.strokeStyle='rgba(255,215,70,.8)';ctx.lineWidth=1.5;ctx.strokeRect(sx-14,sy-14,28,28);
    if(ic[d.itype])ctx.drawImage(ic[d.itype],sx-11,sy-11,22,22);
    if(d.qty>1){
      ctx.fillStyle='rgba(0,0,0,.88)';ctx.fillRect(sx+2,sy-15,16,10);
      ctx.fillStyle='#FFD700';ctx.font='bold 9px monospace';ctx.textAlign='left';
      ctx.fillText(d.qty,sx+4,sy-7);
    }
    ctx.restore();
  }
}

function drawParts(){
  for(const p of parts){ctx.save();ctx.globalAlpha=p.life;ctx.fillStyle=p.col;ctx.fillRect(p.x-cam.x-p.sz/2,p.y-cam.y-p.sz/2,p.sz,p.sz);ctx.restore();}
}

// ── Pixel-art player character ─────────────────────────────────
function drawPlayer(){
  const sx=player.x-cam.x, sy=player.y-cam.y;
  ctx.save();ctx.translate(sx+player.w/2,sy+player.h/2);
  if(player.facing<0)ctx.scale(-1,1);
  const ws=player.onGround?Math.sin(player.walkT)*16:0;
  const hh=player.h/2;
  // Shadow
  ctx.fillStyle='rgba(0,0,0,.22)';ctx.beginPath();ctx.ellipse(0,hh+2,15,5,0,0,Math.PI*2);ctx.fill();
  // Legs
  [[-4,-ws],[4,ws]].forEach(([ox,rot])=>{
    ctx.save();ctx.translate(ox,-hh+28);ctx.rotate(rot*Math.PI/180);
    ctx.fillStyle='#1565C0';ctx.fillRect(-4,0,8,13);
    ctx.fillStyle='#0D47A1';ctx.fillRect(-4,0,2,13);
    ctx.fillStyle='#4E342E';ctx.fillRect(-5,12,10,5);ctx.fillStyle='#3E2723';ctx.fillRect(-5,15,10,2);
    ctx.restore();
  });
  // Body
  ctx.fillStyle='#E53935';ctx.fillRect(-10,-hh+14,20,15);
  ctx.fillStyle='#C62828';ctx.fillRect(-10,-hh+14,3,15);
  ctx.fillStyle='#EF5350';ctx.fillRect(-7,-hh+14,3,15);
  ctx.fillStyle='#FAFAFA';ctx.fillRect(-6,-hh+14,11,3);ctx.fillStyle='#E53935';ctx.fillRect(-4,-hh+14,7,3);
  ctx.fillStyle='#4E342E';ctx.fillRect(-10,-hh+27,20,3);ctx.fillStyle='#FFD600';ctx.fillRect(-4,-hh+27,7,3);
  // Left arm
  ctx.save();ctx.translate(-12,-hh+15);ctx.rotate(ws*.85*Math.PI/180);
  ctx.fillStyle='#E53935';ctx.fillRect(-3,0,7,4);ctx.fillStyle='#FFA726';ctx.fillRect(-3,4,7,11);
  ctx.restore();
  // Right arm (with held item)
  ctx.save();ctx.translate(12,-hh+15);
  const pr=player.punchT>0?-52*(player.punchT/14):-ws*.85;
  ctx.rotate(pr*Math.PI/180);
  ctx.fillStyle='#E53935';ctx.fillRect(-4,0,7,4);ctx.fillStyle='#FFA726';ctx.fillRect(-4,4,7,11);
  if(player.sel>0&&player.cur.qty>0&&ic[player.cur.id]){
    ctx.drawImage(ic[player.cur.id],player.punchT>0?4:-1,13,16,16);
  }
  ctx.restore();
  // Head
  ctx.fillStyle='#FFA726';ctx.fillRect(-11,-hh,22,17);
  ctx.fillStyle='#FF8F00';ctx.fillRect(-11,-hh,3,17);ctx.fillStyle='#FFB74D';ctx.fillRect(-8,-hh,3,17);
  // Hair
  ctx.fillStyle='#4E342E';ctx.fillRect(-11,-hh,22,6);ctx.fillStyle='#6D4C41';ctx.fillRect(-11,-hh,4,11);ctx.fillRect(7,-hh,4,8);
  // Eye
  ctx.fillStyle='#fff';ctx.fillRect(1,-hh+7,8,7);ctx.fillStyle='#1A237E';ctx.fillRect(3,-hh+8,6,5);ctx.fillStyle='#000';ctx.fillRect(4,-hh+9,3,3);ctx.fillStyle='#fff';ctx.fillRect(4,-hh+9,1,1);
  ctx.fillStyle='#3E2723';ctx.fillRect(0,-hh+6,10,2);
  ctx.fillStyle='#E65100';ctx.fillRect(4,-hh+11,4,2);
  if(player.punchT>8){ctx.fillStyle='#000';ctx.fillRect(1,-hh+14,8,2);ctx.fillStyle='#fff';ctx.fillRect(2,-hh+14,6,1);}
  else{ctx.fillStyle='#BF360C';ctx.fillRect(1,-hh+14,8,2);}
  ctx.fillStyle='#FF8F00';ctx.fillRect(-13,-hh+8,3,5);ctx.fillStyle='#E65100';ctx.fillRect(-12,-hh+9,2,3);
  ctx.restore();
}

// ── HUD ────────────────────────────────────────────────────────
function getSlotSize(){return Math.min(54,(VW-20)/player.inv.length-4);}

function rr(x,y,w,h,rad){
  ctx.beginPath();ctx.moveTo(x+rad,y);ctx.lineTo(x+w-rad,y);ctx.arcTo(x+w,y,x+w,y+rad,rad);
  ctx.lineTo(x+w,y+h-rad);ctx.arcTo(x+w,y+h,x+w-rad,y+h,rad);ctx.lineTo(x+rad,y+h);
  ctx.arcTo(x,y+h,x,y+h-rad,rad);ctx.lineTo(x,y+rad);ctx.arcTo(x,y,x+rad,y,rad);ctx.closePath();
}

function drawHUD(){
  const SL=getSlotSize(),PAD=3,n=player.inv.length;
  const totalW=n*(SL+PAD)-PAD,hbX=(VW-totalW)/2,hbY=VH-SL-8;

  // Hotbar bg
  ctx.fillStyle='rgba(12,6,0,.9)';rr(hbX-7,hbY-5,totalW+14,SL+10,8);ctx.fill();
  ctx.strokeStyle='rgba(255,190,50,.28)';ctx.lineWidth=1.5;rr(hbX-7,hbY-5,totalW+14,SL+10,8);ctx.stroke();

  for(let i=0;i<n;i++){
    const slot=player.inv[i],x=hbX+i*(SL+PAD),y=hbY,sel=i===player.sel;
    // Slot
    ctx.fillStyle=sel?'rgba(68,46,4,.95)':'rgba(26,16,3,.92)';rr(x,y,SL,SL,4);ctx.fill();
    ctx.strokeStyle=sel?'#FFD600':'rgba(95,72,25,.55)';ctx.lineWidth=sel?2.2:1.2;rr(x,y,SL,SL,4);ctx.stroke();
    ctx.fillStyle='rgba(255,255,255,.07)';ctx.fillRect(x+2,y+2,SL-4,3);
    ctx.fillStyle='rgba(0,0,0,.25)';ctx.fillRect(x+2,y+SL-4,SL-4,3);

    // Icon
    const ipad=SL*.15|0;
    if(ic[slot.id])ctx.drawImage(ic[slot.id],x+ipad,y+ipad,SL-ipad*2,SL-ipad*2);

    // Count
    if(slot.id!==I.FIST&&slot.id!==I.WRENCH){
      const cnt=String(slot.qty);ctx.font=`bold ${Math.max(8,SL*.18|0)}px monospace`;
      const tw=ctx.measureText(cnt).width;
      ctx.fillStyle=slot.qty>0?'rgba(0,0,0,.88)':'rgba(80,0,0,.88)';ctx.fillRect(x+SL-tw-5,y+SL-13,tw+4,12);
      ctx.fillStyle=slot.qty>0?'#FFD700':'#FF5252';ctx.textAlign='right';ctx.fillText(cnt,x+SL-2,y+SL-4);ctx.textAlign='left';
    }

    // Hotkey
    ctx.fillStyle='rgba(255,255,255,.32)';ctx.font=`${Math.max(7,SL*.14|0)}px monospace`;
    ctx.fillText(i<9?i+1:0,x+3,y+10);

    // Selected glow
    if(sel){ctx.strokeStyle='rgba(255,215,0,.38)';ctx.lineWidth=3;rr(x-2,y-2,SL+4,SL+4,6);ctx.stroke();}
  }

  // Item name
  const cur=player.cur; ctx.font='bold 12px monospace';
  const name=INAME[cur.id]||''; const tw=ctx.measureText(name).width;
  ctx.fillStyle='rgba(0,0,0,.75)';rr(VW/2-tw/2-9,hbY-29,tw+18,20,4);ctx.fill();
  ctx.fillStyle='#FFE082';ctx.textAlign='center';ctx.fillText(name,VW/2,hbY-14);ctx.textAlign='left';

  // World name tag
  ctx.font='bold 11px monospace';
  const wnTw=ctx.measureText('🌍 '+wName).width;
  ctx.fillStyle='rgba(0,0,0,.65)';ctx.fillRect(VW/2-wnTw/2-6,4,wnTw+12,18);
  ctx.fillStyle='#7DF';ctx.textAlign='center';ctx.fillText('🌍 '+wName,VW/2,17);ctx.textAlign='left';

  // Respawn button (top left)
  ctx.fillStyle='rgba(180,20,20,.75)';rr(6,6,80,22,4);ctx.fill();
  ctx.strokeStyle='rgba(255,80,80,.6)';ctx.lineWidth=1;rr(6,6,80,22,4);ctx.stroke();
  ctx.fillStyle='#fff';ctx.font='bold 10px monospace';ctx.fillText('⟳ Respawn',10,21);

  // Cursor tile highlight
  const wr=mouse.wy/TS|0,wc=mouse.wx/TS|0;
  const tsx=wc*TS-cam.x,tsy=wr*TS-cam.y;
  const cell=cellAt(wr,wc);
  const pdist=Math.hypot(player.x+player.w/2-(wc*TS+TS/2),player.y+player.h/2-(wr*TS+TS/2));
  if(pdist<=REACH){
    const onTree=trees.some(t=>t.world===wName&&t.stage===2&&wc===t.col&&wr>=t.row-2&&wr<=t.row);
    if((cell&&cell.type!==T.AIR&&cell.type!==T.CAVE_BG&&cell.mhp!==Infinity)||onTree){
      ctx.strokeStyle='rgba(255,255,255,.9)';ctx.lineWidth=2;ctx.setLineDash([5,3]);
      ctx.strokeRect(tsx+1,tsy+1,TS-2,TS-2);ctx.setLineDash([]);
      // Break bar
      if(bs.r===wr&&bs.c===wc&&cell&&cell.mhp>1&&cell.mhp!==Infinity){
        const pct=1-cell.hp/cell.mhp;
        ctx.fillStyle='rgba(0,0,0,.6)';ctx.fillRect(tsx,tsy+TS-5,TS,5);
        ctx.fillStyle=`hsl(${120-pct*120},100%,50%)`;ctx.fillRect(tsx,tsy+TS-5,TS*pct,5);
      }
    } else if(cell&&cell.type===T.AIR){
      const canPlace={[I.DIRT]:1,[I.ROCK]:1,[I.SAND]:1,[I.WOOD]:1,[I.LAVA]:1,[I.DOOR]:1,[I.SIGN]:1,[I.PLATFORM]:1};
      if(canPlace[player.cur.id]&&player.cur.qty>0){
        ctx.strokeStyle='rgba(100,255,100,.5)';ctx.lineWidth=1.5;ctx.setLineDash([4,4]);
        ctx.strokeRect(tsx+1,tsy+1,TS-2,TS-2);ctx.setLineDash([]);
      }
    }
  }

  // Gem count top right
  const gems=player.inv.find(s=>s.id===I.GEMS);
  if(gems){
    ctx.fillStyle='rgba(0,0,0,.65)';ctx.fillRect(VW-70,4,66,18);
    ctx.fillStyle='#CE93D8';ctx.font='bold 11px monospace';ctx.textAlign='right';
    ctx.fillText('💎 '+gems.qty,VW-6,17);ctx.textAlign='left';
  }
}

// ════════════════════════════════════════════════════════════════
//  MAIN LOOP
// ════════════════════════════════════════════════════════════════
let lastTs=0, clkT=0;

function loop(ts){
  const dt=Math.min(ts-lastTs,50); lastTs=ts;
  glowT+=.033;
  for(const cl of clouds){cl.x+=cl.spd;if(cl.x>WORLD_W*TS+cl.w)cl.x=-cl.w;}

  updatePlayer();
  updateCam();
  updateDrops();
  updateTrees(dt);
  updateParts();

  // Tooltip fade
  if(tooltipTimer>0){tooltipTimer--;if(tooltipTimer===0)document.getElementById('tooltip').style.display='none';}

  // Block all game interaction while portal is open
  if(!portalOpen){
    if(mouse.down){
      clkT++;
      if(mouse.just||clkT%BREAK_INTERVAL===0) handleInteract();
    } else { clkT=0; bs={r:-1,c:-1,cd:0}; }
    // Respawn button click
    if(mouse.just&&mouse.x>=6&&mouse.x<=86&&mouse.y>=6&&mouse.y<=28) respawnPlayer();
  }
  mouse.just=false;

  // Render
  ctx.clearRect(0,0,VW,VH);
  drawBG();
  drawWorld();
  drawTrees();
  drawDrops();
  drawParts();
  drawPlayer();
  drawHUD();

  requestAnimationFrame(loop);
}

// ── Start ─────────────────────────────────────────────────────
initGame();
canvas.focus();
requestAnimationFrame(loop);
</script>
