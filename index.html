<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glowing Rose & Meteor Shower</title>
    <style>
        /* 1. STRUKTUR & LAYOUT */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100vw;
            height: 100vh;
            background-color: #000000; /* Latar belakang hitam pekat */
            overflow: hidden; /* Tidak boleh ada scrollbar */
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 3. ANIMASI LATAR BELAKANG (Canvas diletakkan di lapisan bawah) */
        #pinkboard {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1; /* Di belakang mawar */
        }

        /* 2. EFEK VISUAL MAWAR */
        .glowing-rose {
            position: relative;
            z-index: 2; /* Di depan canvas */
            max-width: 80vw;
            max-height: 80vh;
            /* Gabungan animasi melayang (float) dan berdenyut (pulse) */
            animation: float 4s ease-in-out infinite, pulse 2s ease-in-out infinite alternate;
        }

        /* Animasi melayang naik-turun */
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-25px); }
            100% { transform: translateY(0px); }
        }

        /* Animasi berdenyut (Pulse) menggunakan filter drop-shadow */
        @keyframes pulse {
            0% { 
                filter: drop-shadow(0 0 10px rgba(255, 105, 180, 0.4)) 
                        drop-shadow(0 0 20px rgba(255, 182, 193, 0.3)); 
            }
            100% { 
                filter: drop-shadow(0 0 25px rgba(255, 105, 180, 0.9)) 
                        drop-shadow(0 0 50px rgba(255, 182, 193, 0.8)); 
            }
        }
    </style>
</head>
<body>

    <canvas id="pinkboard"></canvas>

    <img src="rose.png" class="glowing-rose" alt="Glowing Rose">

    <script>
        const canvas = document.getElementById('pinkboard');
        const ctx = canvas.getContext('2d');
        
        let width, height;

        // Fungsi resize otomatis
        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // --- SISTEM BINTANG KELAP-KELIP ---
        const stars = [];
        const STAR_COUNT = 400;

        class Star {
            constructor() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.radius = Math.random() * 1.5;
                // Dominan putih dan pink muda
                this.color = Math.random() > 0.5 ? '255, 255, 255' : '255, 182, 193';
                this.alpha = Math.random();
                this.alphaChange = (Math.random() * 0.02 + 0.005) * (Math.random() > 0.5 ? 1 : -1);
            }

            draw() {
                // Efek kelap-kelip (perubahan alpha)
                this.alpha += this.alphaChange;
                if (this.alpha <= 0.1) {
                    this.alpha = 0.1;
                    this.alphaChange *= -1;
                } else if (this.alpha >= 1) {
                    this.alpha = 1;
                    this.alphaChange *= -1;
                }

                ctx.beginPath();
                ctx.fillStyle = `rgba(${this.color}, ${this.alpha})`;
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        for (let i = 0; i < STAR_COUNT; i++) {
            stars.push(new Star());
        }

        // --- SISTEM HUJAN METEOR ---
        const meteors = [];
        const METEOR_COUNT = 12;

        class Meteor {
            constructor() {
                this.reset();
            }

            reset() {
                // Memulai meteor dari luar layar atas atau kiri
                this.x = Math.random() * width * 1.5 - width * 0.2; 
                this.y = Math.random() * height * -1;
                this.length = Math.random() * 80 + 60;
                this.speed = Math.random() * 5 + 4;
                // Sudut 30 derajat (dalam radian)
                this.angle = 30 * Math.PI / 180; 
                this.thickness = Math.random() * 1.5 + 0.5;
            }

            draw() {
                // Pergerakan meteor sesuai sudut
                this.x += this.speed * Math.cos(this.angle);
                this.y += this.speed * Math.sin(this.angle);

                // Reset meteor jika sudah melewati batas bawah/kanan layar
                if (this.y > height + this.length || this.x > width + this.length) {
                    this.reset();
                }

                // Menghitung koordinat ekor
                const endX = this.x - this.length * Math.cos(this.angle);
                const endY = this.y - this.length * Math.sin(this.angle);

                // Membuat gradasi linier untuk efek ekor
                const gradient = ctx.createLinearGradient(this.x, this.y, endX, endY);
                gradient.addColorStop(0, 'rgba(255, 105, 180, 1)'); // Kepala (pink terang)
                gradient.addColorStop(1, 'rgba(255, 105, 180, 0)'); // Ekor (transparan)

                ctx.beginPath();
                ctx.strokeStyle = gradient;
                ctx.lineWidth = this.thickness;
                ctx.moveTo(this.x, this.y);
                ctx.lineTo(endX, endY);
                ctx.stroke();
            }
        }

        for (let i = 0; i < METEOR_COUNT; i++) {
            meteors.push(new Meteor());
        }

        // --- LOOP ANIMASI ---
        function animate() {
            // Bersihkan frame sebelumnya
            ctx.clearRect(0, 0, width, height);
            
            // Gambar semua bintang
            stars.forEach(star => star.draw());
            
            // Gambar semua meteor
            meteors.forEach(meteor => meteor.draw());

            requestAnimationFrame(animate);
        }

        // Mulai animasi
        animate();
    </script>
</body>
</html>
