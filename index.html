<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flores y Corazones</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@300;400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#04010f;
  --green:#028137;
  --accent:#ff3c6e;
}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg)}

/* ═══════════════════════════════════════
   LOGIN SCREEN  — dark modern glassmorphism
═══════════════════════════════════════ */
#login-screen{
  position:fixed;inset:0;z-index:9999;
  background:radial-gradient(ellipse at 60% 40%,#1a0025 0%,#04010f 70%);
  display:flex;align-items:center;justify-content:center;
}

/* subtle mesh grid */
#login-screen::before{
  content:"";position:absolute;inset:0;
  background-image:
    linear-gradient(rgba(255,60,110,.04) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,60,110,.04) 1px,transparent 1px);
  background-size:40px 40px;
  pointer-events:none;
}

/* ambient glow blobs */
.blob{
  position:absolute;border-radius:50%;filter:blur(80px);
  pointer-events:none;opacity:.18;
}
.blob-1{width:420px;height:420px;background:#7b1fa2;top:-80px;left:-120px}
.blob-2{width:320px;height:320px;background:#c2185b;bottom:-60px;right:-80px}
.blob-3{width:200px;height:200px;background:#3949ab;top:40%;left:60%}

/* floating hearts bg */
#lhb{position:absolute;inset:0;overflow:hidden;pointer-events:none}
.lh{position:absolute;bottom:-8%;animation:lhUp var(--d,10s) var(--dl,0s) linear infinite;opacity:0}
@keyframes lhUp{
  0%{opacity:0;transform:translateY(0) translateX(0) scale(.3) rotate(0deg)}
  8%{opacity:.35}
  90%{opacity:.15}
  100%{opacity:0;transform:translateY(-110vh) translateX(var(--dx,30px)) scale(1.1) rotate(15deg)}
}

/* card */
.card{
  position:relative;z-index:2;
  width:min(380px,92vw);
  padding:44px 40px 36px;
  border-radius:24px;
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.09);
  backdrop-filter:blur(24px);
  -webkit-backdrop-filter:blur(24px);
  box-shadow:0 30px 80px rgba(0,0,0,.6),0 0 0 1px rgba(255,255,255,.06) inset;
}

.card-eyebrow{
  font-family:'Inter',sans-serif;font-weight:300;
  font-size:.68rem;letter-spacing:.25em;text-transform:uppercase;
  color:rgba(255,255,255,.28);margin-bottom:10px;text-align:center;
}
.card-title{
  font-family:'DM Serif Display',serif;font-style:italic;
  font-size:clamp(1.5rem,5vw,2.1rem);
  color:#fff;text-align:center;
  line-height:1.25;margin-bottom:32px;
  /* subtle gradient */
  background:linear-gradient(135deg,#fff 40%,rgba(255,180,200,.7));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}

/* input group */
.field-group{display:flex;flex-direction:column;gap:12px;margin-bottom:8px}
.field-wrap{position:relative}
.field-wrap input{
  width:100%;padding:14px 18px;
  background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.1);
  border-radius:14px;
  color:#fff;font-family:'Inter',sans-serif;font-size:.9rem;font-weight:300;
  outline:none;
  transition:border-color .25s,background .25s,box-shadow .25s;
  -webkit-appearance:none;
}
.field-wrap input::placeholder{color:rgba(255,255,255,.22);font-size:.85rem}
.field-wrap input:focus{
  border-color:rgba(255,60,110,.55);
  background:rgba(255,60,110,.06);
  box-shadow:0 0 0 4px rgba(255,60,110,.1);
}

/* error */
.err-msg{
  font-family:'Inter',sans-serif;font-size:.78rem;font-weight:300;
  color:#ff6090;text-align:center;min-height:20px;
  margin:6px 0 4px;letter-spacing:.02em;
  opacity:0;transition:opacity .3s;
}
.err-msg.show{opacity:1}

/* submit btn */
.btn-submit{
  width:100%;margin-top:4px;
  padding:15px;border-radius:14px;border:none;
  background:linear-gradient(135deg,#ff1a5e 0%,#ff6b8a 100%);
  color:#fff;font-family:'DM Serif Display',serif;font-style:italic;
  font-size:1.1rem;letter-spacing:.04em;
  cursor:pointer;
  transition:transform .15s,box-shadow .2s,opacity .2s;
  box-shadow:0 8px 32px rgba(255,30,90,.35);
}
.btn-submit:hover{box-shadow:0 12px 40px rgba(255,30,90,.5);transform:translateY(-1px)}
.btn-submit:active{transform:scale(.97);opacity:.85}

/* divider */
.divider{
  display:flex;align-items:center;gap:12px;
  margin:20px 0 0;
}
.divider::before,.divider::after{content:"";flex:1;height:1px;background:rgba(255,255,255,.08)}
.divider span{font-family:'Inter',sans-serif;font-size:.7rem;color:rgba(255,255,255,.2);letter-spacing:.1em}

@keyframes cardShake{
  0%,100%{transform:translateX(0)}
  15%{transform:translateX(-10px)}
  35%{transform:translateX(10px)}
  55%{transform:translateX(-6px)}
  75%{transform:translateX(6px)}
}

/* ═══════════════════════════════════════
   MAIN SCENE
═══════════════════════════════════════ */
#main-scene{
  position:fixed;inset:0;display:none;
  align-items:flex-end;justify-content:center;
  perspective:1200px;
}

/* night sky */
.night{
  position:absolute;inset:0;
  background-image:
    radial-gradient(ellipse at top,transparent 0%,var(--bg) 80%),
    radial-gradient(ellipse at 30% 60%,rgba(60,20,120,.25) 0%,transparent 60%),
    radial-gradient(ellipse at 70% 80%,rgba(0,60,20,.3) 0%,transparent 50%),
    repeating-linear-gradient(220deg,#000 0px,#000 19px,transparent 19px,transparent 22px),
    repeating-linear-gradient(189deg,#000 0px,#000 19px,transparent 19px,transparent 22px),
    repeating-linear-gradient(148deg,#000 0px,#000 19px,transparent 19px,transparent 22px),
    linear-gradient(90deg,rgb(180,60,0),rgb(30,30,50));
  filter:blur(.08vmin);
}

/* stars */
.stars{position:absolute;inset:0;pointer-events:none;z-index:1}
.star{
  position:absolute;border-radius:50%;background:#fff;
  animation:twinkle var(--d,3s) ease-in-out infinite alternate;
}
@keyframes twinkle{
  from{opacity:.05;transform:scale(.6)}
  to{opacity:1;transform:scale(1.4)}
}

/* moon */
.moon{
  position:absolute;top:6vh;right:9vw;
  width:clamp(36px,5vmin,62px);height:clamp(36px,5vmin,62px);
  border-radius:50%;
  background:radial-gradient(circle at 33% 33%,#fffde8,#ffd700 50%,#e8981a);
  box-shadow:0 0 16px 5px rgba(255,210,40,.28),0 0 50px 16px rgba(255,195,0,.1);
  z-index:5;
  animation:moonDrift 10s ease-in-out infinite alternate;
}
@keyframes moonDrift{from{transform:translateY(0) rotate(-2deg)}to{transform:translateY(-10px) rotate(2deg)}}

/* fireflies */
.ff{
  position:absolute;border-radius:50%;
  background:#ffe566;box-shadow:0 0 6px 2px rgba(255,229,102,.6);
  animation:ffDrift var(--dur,7s) var(--del,0s) ease-in-out infinite alternate;
  opacity:0;z-index:60;
}
@keyframes ffDrift{
  0%{transform:translate(0,0);opacity:0}
  15%{opacity:.9}80%{opacity:.5}
  100%{transform:translate(var(--tx,40px),var(--ty,-60px));opacity:0}
}

/* ground */
.ground{
  position:absolute;bottom:0;left:0;width:100%;height:14vmin;
  background:linear-gradient(to top,#010b04,#011d0a,#023d14 75%,transparent);
  z-index:25;
}

/* ── FLOWERS ── */
.flowers{
  position:relative;width:100vw;height:100vh;z-index:10;
  transform-origin:bottom center;
}

.flower{
  position:absolute;bottom:10vmin;
  transform-origin:bottom center;
  z-index:10;
  --sp:12s; /* slower = smoother */
}

/* organic swaying — cubic-bezier feels alive */
.flower--1{
  left:50%;
  animation:sway1 var(--sp) cubic-bezier(.45,.05,.55,.95) infinite;
}
.flower--2{
  left:50%;transform:rotate(20deg);
  animation:sway2 calc(var(--sp)*1.1) cubic-bezier(.45,.05,.55,.95) infinite;
}
.flower--3{
  left:50%;transform:rotate(-15deg);
  animation:sway3 calc(var(--sp)*.9) cubic-bezier(.45,.05,.55,.95) infinite;
}
.flower--4{
  left:40%;transform:rotate(10deg);
  animation:sway2 calc(var(--sp)*1.2) cubic-bezier(.45,.05,.55,.95) infinite;
}

@keyframes sway1{
  0%   {transform:rotate(2deg) translateX(0)}
  25%  {transform:rotate(-1.5deg) translateX(-1px)}
  50%  {transform:rotate(2.5deg) translateX(1px)}
  75%  {transform:rotate(-1deg) translateX(0)}
  100% {transform:rotate(2deg) translateX(0)}
}
@keyframes sway2{
  0%   {transform:rotate(22deg)}
  30%  {transform:rotate(19deg) translateX(-1px)}
  65%  {transform:rotate(23deg) translateX(1px)}
  100% {transform:rotate(22deg)}
}
@keyframes sway3{
  0%   {transform:rotate(-14deg)}
  40%  {transform:rotate(-17deg) translateX(1px)}
  70%  {transform:rotate(-13deg) translateX(-1px)}
  100% {transform:rotate(-14deg)}
}

/* stem */
.flower__line{
  width:1.4vmin;
  background-image:
    linear-gradient(to left,transparent,rgba(0,0,0,.15),transparent,rgba(255,255,255,.15)),
    linear-gradient(to top,transparent 5%,#045e1e,#028137);
  box-shadow:inset 0 0 3px rgba(0,0,0,.4);
  animation:growStem 3.5s cubic-bezier(.22,1,.36,1) backwards;
  transform-origin:bottom center;
}
.flower--1 .flower__line{height:70vmin;animation-delay:.2s}
.flower--2 .flower__line{height:60vmin;animation-delay:.5s}
.flower--3 .flower__line{height:68vmin;animation-delay:.8s}
.flower--4 .flower__line{height:52vmin;animation-delay:.4s}
@keyframes growStem{
  0%{height:0;opacity:0}
  30%{opacity:1}
}

/* stem leaves */
.flower__line__leaf{
  --w:7vmin;--h:calc(var(--w) + 2vmin);
  position:absolute;top:20%;left:90%;
  width:var(--w);height:var(--h);
  border-top-right-radius:var(--h);border-bottom-left-radius:var(--h);
  background-image:linear-gradient(to top,rgba(3,80,25,.5),#028137);
}
.flower__line__leaf--1{transform:rotate(70deg) rotateY(30deg);animation:blR .9s 1.6s cubic-bezier(.34,1.56,.64,1) backwards}
.flower__line__leaf--2{top:45%;transform:rotate(70deg) rotateY(30deg);animation:blR .9s 1.4s cubic-bezier(.34,1.56,.64,1) backwards}
.flower__line__leaf--3,.flower__line__leaf--4{
  border-top-right-radius:0;border-bottom-left-radius:0;
  border-top-left-radius:var(--h);border-bottom-right-radius:var(--h);
  left:-460%;top:12%;transform:rotate(-70deg) rotateY(30deg);
  animation:blL .9s 1.2s cubic-bezier(.34,1.56,.64,1) backwards;
}
.flower__line__leaf--4{top:40%;animation:blL .9s 1s cubic-bezier(.34,1.56,.64,1) backwards}
.flower__line__leaf--5{top:0;transform-origin:left;transform:rotate(70deg) rotateY(30deg) scale(.6);animation:blR .9s 1.8s cubic-bezier(.34,1.56,.64,1) backwards}
.flower__line__leaf--6{top:-2%;left:-450%;transform-origin:right;transform:rotate(-70deg) rotateY(30deg) scale(.6);animation:blL .9s 2s cubic-bezier(.34,1.56,.64,1) backwards}
@keyframes blR{0%{transform-origin:left;transform:rotate(70deg) rotateY(30deg) scale(0)}}
@keyframes blL{0%{transform-origin:right;transform:rotate(-70deg) rotateY(30deg) scale(0)}}

/* petals */
.flower__leafs{
  position:relative;
  animation:bloom 1.2s cubic-bezier(.34,1.56,.64,1) backwards;
}
.flower__leafs--1{animation-delay:1.2s}
.flower__leafs--2{animation-delay:1.5s}
.flower__leafs--3{animation-delay:1.8s}
.flower__leafs--4{animation-delay:1.6s}
.flower__leafs::after{
  content:"";position:absolute;left:0;top:0;
  transform:translate(-50%,-100%);
  width:8vmin;height:8vmin;
  background:rgba(255,150,180,.4);filter:blur(8vmin);
}
@keyframes bloom{0%{transform:scale(0) rotate(-20deg);opacity:0}}

.flower__leaf{
  position:absolute;bottom:0;left:50%;
  width:8vmin;height:11vmin;
  border-radius:51% 49% 47% 53%/44% 45% 55% 69%;
  background-image:linear-gradient(160deg,#ffccd8,#ff7096 45%,#e8325f);
  transform-origin:bottom center;opacity:.92;
  box-shadow:inset 0 0 2vmin rgba(255,255,255,.45),0 2px 8px rgba(200,20,80,.2);
}
.flower__leaf--1{transform:translate(-10%,1%) rotateY(40deg) rotateX(-50deg)}
.flower__leaf--2{transform:translate(-50%,-4%) rotateX(40deg)}
.flower__leaf--3{transform:translate(-90%,0%) rotateY(45deg) rotateX(50deg)}
.flower__leaf--4{width:8vmin;height:8vmin;transform-origin:bottom left;transform:translate(0%,18%) rotateX(70deg) rotate(-43deg);background-image:linear-gradient(160deg,#ffccd8,#ff7096 45%,#e8325f);z-index:1;opacity:.8}

.flower__white-circle{
  position:absolute;left:-3.5vmin;top:-3vmin;
  width:9vmin;height:4vmin;border-radius:50%;
  background:radial-gradient(circle at 40% 40%,#fff,#fffde0 60%,#ffd700);
}
.flower__white-circle::after{
  content:"";position:absolute;left:50%;top:45%;
  transform:translate(-50%,-50%);width:60%;height:60%;border-radius:inherit;
  background:repeating-linear-gradient(135deg,rgba(0,0,0,.03) 0,rgba(0,0,0,.03) 1px,transparent 1px,transparent 12px),
    repeating-linear-gradient(45deg,rgba(0,0,0,.03) 0,rgba(0,0,0,.03) 1px,transparent 1px,transparent 12px),
    linear-gradient(90deg,#ffe818,#ffd000);
}

/* stamens */
.flower__light{
  position:absolute;bottom:0;
  width:1vmin;height:1vmin;border-radius:50%;
  filter:blur(.15vmin);
  animation:rise 5s ease-in-out infinite backwards;
}
.flower__light:nth-child(odd){background:#ffe566}
.flower__light:nth-child(even){background:#4caf50}
.flower__light--1{left:-2vmin;animation-delay:1s;animation-duration:5s}
.flower__light--2{left:3vmin;animation-delay:1.8s;animation-duration:6s}
.flower__light--3{left:-5vmin;animation-delay:.8s;animation-duration:4.5s}
.flower__light--4{left:5vmin;animation-delay:2.2s;animation-duration:5.5s}
.flower__light--5{left:-1vmin;animation-delay:3s;animation-duration:7s}
.flower__light--6{left:-4vmin;animation-delay:2.6s;animation-duration:5s}
.flower__light--7{left:2vmin;animation-delay:1.4s;animation-duration:6.5s}
.flower__light--8{left:-6vmin;animation-delay:3.5s;animation-duration:4.8s}
@keyframes rise{
  0%{opacity:0;bottom:0;transform:scale(0)}
  20%{opacity:1;transform:scale(1.4)}
  80%{opacity:.5}
  100%{opacity:0;bottom:28vmin;transform:scale(.5) translateX(var(--drift,8px))}
}

/* grass */
.flower__grass{
  --c:#028137;--lw:1.5vmin;
  position:absolute;bottom:12vmin;left:-7vmin;
  display:flex;flex-direction:column;align-items:flex-end;
  z-index:20;transform-origin:bottom center;
}
.flower__grass--1{
  transform:rotate(-48deg) rotateY(40deg);
  animation:grassSway 6s cubic-bezier(.45,.05,.55,.95) infinite;
}
.flower__grass--2{
  left:2vmin;bottom:10vmin;
  transform:scale(.5) rotate(75deg) rotateX(10deg) rotateY(-200deg);
  opacity:.75;z-index:0;
  animation:grassSway2 5s cubic-bezier(.45,.05,.55,.95) infinite;
}
@keyframes grassSway{
  0%,100%{transform:rotate(-48deg) rotateY(40deg)}
  50%{transform:rotate(-51deg) rotateY(42deg)}
}
@keyframes grassSway2{
  0%,100%{transform:scale(.5) rotate(75deg) rotateX(10deg) rotateY(-200deg)}
  50%{transform:scale(.5) rotate(78deg) rotateX(12deg) rotateY(-200deg)}
}
.flower__grass--top{width:7vmin;height:10vmin;border-top-right-radius:100%;border-right:var(--lw) solid var(--c);transform-origin:bottom center;transform:rotate(-2deg)}
.flower__grass--bottom{margin-top:-2px;width:var(--lw);height:25vmin;background-image:linear-gradient(to top,transparent,var(--c))}
.flower__grass__leaf{
  --size:10vmin;position:absolute;
  width:calc(var(--size)*2.1);height:var(--size);
  border-top-left-radius:var(--size);border-top-right-radius:var(--size);
  background-image:linear-gradient(to top,transparent 30%,var(--c));z-index:100;
}
.flower__grass__leaf--1{top:-6%;left:30%;--size:6vmin;transform:rotate(-20deg);animation:gga1 1.5s 2.4s cubic-bezier(.34,1.56,.64,1) backwards}
.flower__grass__leaf--2{top:-5%;left:-110%;--size:6vmin;transform:rotate(10deg);animation:gga2 1.5s 2.2s cubic-bezier(.34,1.56,.64,1) backwards}
.flower__grass__leaf--3{top:5%;left:60%;--size:8vmin;transform:rotate(-18deg) rotateX(-20deg);animation:gga3 1.5s 2s cubic-bezier(.34,1.56,.64,1) backwards}
.flower__grass__leaf--4{top:6%;left:-135%;--size:8vmin;transform:rotate(2deg);animation:gga4 1.5s 1.8s cubic-bezier(.34,1.56,.64,1) backwards}
.flower__grass__leaf--5{top:20%;left:60%;--size:10vmin;transform:rotate(-24deg) rotateX(-20deg);animation:gga5 1.5s 1.6s cubic-bezier(.34,1.56,.64,1) backwards}
.flower__grass__leaf--6{top:22%;left:-180%;--size:10vmin;transform:rotate(10deg);animation:gga6 1.5s 1.4s cubic-bezier(.34,1.56,.64,1) backwards}
.flower__grass__leaf--7{top:39%;left:70%;--size:10vmin;transform:rotate(-10deg);animation:gga7 1.5s 1.2s cubic-bezier(.34,1.56,.64,1) backwards}
.flower__grass__leaf--8{top:40%;left:-215%;--size:11vmin;transform:rotate(10deg);animation:gga8 1.5s 1s cubic-bezier(.34,1.56,.64,1) backwards}
@keyframes gga1{0%{transform-origin:bottom left;transform:rotate(-20deg) scale(0)}}
@keyframes gga2{0%{transform-origin:bottom right;transform:rotate(10deg) scale(0)}}
@keyframes gga3{0%{transform-origin:bottom left;transform:rotate(-18deg) rotateX(-20deg) scale(0)}}
@keyframes gga4{0%{transform-origin:bottom right;transform:rotate(2deg) scale(0)}}
@keyframes gga5{0%{transform-origin:bottom left;transform:rotate(-24deg) rotateX(-20deg) scale(0)}}
@keyframes gga6{0%{transform-origin:bottom right;transform:rotate(10deg) scale(0)}}
@keyframes gga7{0%{transform-origin:bottom left;transform:rotate(-10deg) scale(0)}}
@keyframes gga8{0%{transform-origin:bottom right;transform:rotate(10deg) scale(0)}}
.flower__grass__overlay{position:absolute;top:-10%;right:0;width:100%;height:100%;background:rgba(0,0,0,.55);filter:blur(1.2vmin);z-index:100}

/* long grass */
.flower__g-long{
  --w:2vmin;--h:6vmin;--c:#0d6632;
  position:absolute;bottom:10vmin;left:-3vmin;
  transform-origin:bottom center;
  transform:rotate(-30deg) rotateY(-20deg);
  display:flex;flex-direction:column;align-items:flex-end;
  animation:longGrassSway 7s cubic-bezier(.45,.05,.55,.95) infinite;
}
@keyframes longGrassSway{
  0%,100%{transform:rotate(-30deg) rotateY(-20deg)}
  50%{transform:rotate(-33deg) rotateY(-22deg)}
}
.flower__g-long__top{width:var(--w);height:var(--h);border-top-right-radius:100%;border-right:.7vmin solid var(--c);transform-origin:bottom center;transform:translate(-.7vmin,1vmin)}
.flower__g-long__bottom{width:var(--w);height:50vmin;background-image:linear-gradient(to top,transparent 30%,var(--c));clip-path:polygon(35% 0,65% 1%,100% 100%,0% 100%)}

.flower__g-right{position:absolute;bottom:5vmin;left:-2vmin;transform-origin:bottom left}
.flower__g-right--1{animation:rightSway1 8s cubic-bezier(.45,.05,.55,.95) infinite}
.flower__g-right--2{left:5vmin;animation:rightSway2 9s cubic-bezier(.45,.05,.55,.95) infinite}
@keyframes rightSway1{0%,100%{transform:rotate(20deg)}50%{transform:rotate(23deg) rotateX(-15deg)}}
@keyframes rightSway2{0%,100%{transform:rotateY(-180deg) rotate(0deg)}50%{transform:rotateY(-180deg) rotate(5deg)}}
.leaf{width:30vmin;height:50vmin;border-top-left-radius:100%;border-left:2vmin solid #028137;background-image:linear-gradient(to bottom,transparent,var(--bg) 60%);-webkit-mask-image:linear-gradient(to top,transparent 30%,#028137 60%);mask-image:linear-gradient(to top,transparent 30%,#028137 60%);opacity:.8;filter:blur(.25vmin)}
.flower__g-right--2 .leaf{height:75vmin}

.flower__g-front{
  position:absolute;bottom:6vmin;left:2.5vmin;
  z-index:100;transform-origin:bottom center;
  animation:frontSway 7s cubic-bezier(.45,.05,.55,.95) infinite;
}
@keyframes frontSway{
  0%,100%{transform:rotate(-28deg) rotateY(30deg) scale(1.04)}
  50%{transform:rotate(-33deg) rotateY(35deg) scale(1.04)}
}
.flower__g-front__line{width:.3vmin;height:20vmin;background-image:linear-gradient(to top,transparent,#028137,transparent);position:relative}
.flower__g-front__leaf-wrapper{position:absolute;top:0;left:0;transform-origin:bottom left;transform:rotate(10deg)}
.flower__g-front__leaf-wrapper:nth-child(even){left:0;transform:rotateY(-180deg) rotate(5deg)}
.flower__g-front__leaf{width:10vmin;height:10vmin;border-radius:100% 0%/100% 0%;background-image:linear-gradient(to bottom left,#028137 50%,transparent);-webkit-mask-image:linear-gradient(to bottom right,#028137 50%,transparent 50%);mask-image:linear-gradient(to bottom right,#028137 50%,transparent 50%)}

/* floating hearts */
.bubbles{position:absolute;inset:0;z-index:50;pointer-events:none;overflow:hidden}
.bubble{position:absolute;bottom:-8%;opacity:0;animation:rise2 var(--dur,9s) var(--del,0s) ease-in infinite}
.bubble svg{width:var(--sz,2.5vmin);height:var(--sz,2.5vmin);fill:var(--col,#ff3c6e);filter:drop-shadow(0 0 5px var(--col))}
.bubble.ring{
  background:transparent;border:1.5px solid var(--col,#ff3c6e);border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  width:calc(var(--sz,2.5vmin)*2.5);height:calc(var(--sz,2.5vmin)*2.5);
}
.bubble.ring svg{width:var(--sz,2.5vmin);height:var(--sz,2.5vmin)}
@keyframes rise2{
  0%{transform:translateX(0) scale(.25);opacity:0}
  10%{opacity:.9}
  85%{opacity:.35}
  100%{transform:translateX(var(--dx,30px)) scale(1.05);bottom:110%;opacity:0}
}

/* music bar */
#music-bar{
  position:fixed;bottom:18px;left:50%;transform:translateX(-50%);
  z-index:400;
  display:flex;align-items:center;gap:10px;
  background:rgba(10,5,20,.7);backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,.1);
  border-radius:100px;padding:8px 20px;
  pointer-events:none;
  animation:barIn 1.2s 1s cubic-bezier(.34,1.56,.64,1) both;
}
@keyframes barIn{from{opacity:0;transform:translateX(-50%) translateY(20px) scale(.9)}to{opacity:1;transform:translateX(-50%) translateY(0) scale(1)}}
.mb-dot{width:7px;height:7px;border-radius:50%;background:#ff3c6e;animation:dotPulse 1.5s ease-in-out infinite alternate}
@keyframes dotPulse{from{box-shadow:0 0 0 0 rgba(255,60,110,.6)}to{box-shadow:0 0 0 5px rgba(255,60,110,0)}}
.mb-info{display:flex;flex-direction:column;gap:2px}
.mb-label{font-family:'Inter',sans-serif;font-size:.6rem;font-weight:300;color:rgba(255,255,255,.3);letter-spacing:.12em;text-transform:uppercase}
.mb-title{font-family:'DM Serif Display',serif;font-style:italic;font-size:.82rem;color:rgba(255,220,230,.9);letter-spacing:.04em;white-space:nowrap}
.mb-wave{display:flex;align-items:flex-end;gap:2.5px;height:14px}
.mb-w{width:2.5px;border-radius:2px;background:#ff3c6e;animation:wave var(--t,.6s) ease-in-out infinite alternate}
@keyframes wave{from{height:3px}to{height:13px}}
.mb-w:nth-child(1){--t:.5s}.mb-w:nth-child(2){--t:.8s;animation-delay:.08s}
.mb-w:nth-child(3){--t:.4s;animation-delay:.16s}.mb-w:nth-child(4){--t:.7s;animation-delay:.04s}
.mb-w:nth-child(5){--t:.6s;animation-delay:.12s}.mb-w:nth-child(6){--t:.9s;animation-delay:.2s}

/* hidden youtube */
#yt{position:fixed;bottom:-1000px;left:-1000px;width:1px;height:1px;opacity:0;pointer-events:none}
</style>
</head>
<body>

<script>
const U='SyahlaFarrasNafisyah', P='Syahlaoka';
const HP='M23.6 2c-3.363 0-6.258 2.736-7.599 5.594-1.342-2.858-4.237-5.594-7.601-5.594-4.637 0-8.4 3.764-8.4 8.401 0 9.433 9.516 11.906 16.001 21.232 6.13-9.268 15.999-12.1 15.999-21.232 0-4.637-3.763-8.401-8.4-8.401z';
const COLS=['#ff3c6e','#ff6b8a','#e91e63','#f06292','#ff1744','#c2185b','#ff80ab','#ad1457'];

/* login bg hearts */
const lhb=document.getElementById('lhb');
for(let i=0;i<26;i++){
  const el=document.createElement('div');el.className='lh';
  const sz=(Math.random()*2.8+.8).toFixed(1);
  const col=COLS[~~(Math.random()*COLS.length)];
  const ring=Math.random()>.5;
  el.style.cssText=`left:${Math.random()*100}%;--d:${(Math.random()*10+6).toFixed(1)}s;--dl:${(Math.random()*9).toFixed(1)}s;--dx:${(Math.random()*140-70).toFixed(0)}px`;
  if(ring){
    el.innerHTML=`<div style="border:1.5px solid ${col};border-radius:50%;width:${sz*2.3}vmin;height:${sz*2.3}vmin;display:flex;align-items:center;justify-content:center;opacity:.35"><svg viewBox="0 0 32 32" style="width:${sz}vmin;height:${sz}vmin;fill:${col}"><path d="${HP}"/></svg></div>`;
  }else{
    el.innerHTML=`<svg viewBox="0 0 32 32" style="width:${sz}vmin;height:${sz}vmin;fill:${col};filter:drop-shadow(0 0 5px ${col});opacity:.4"><path d="${HP}"/></svg>`;
  }
  lhb.appendChild(el);
}

/* login */
function doLogin(){
  const u=document.getElementById('usr').value.trim();
  const p=document.getElementById('pwd').value;
  const err=document.getElementById('err');
  if(u===U&&p===P){
    err.classList.remove('show');
    const ls=document.getElementById('login-screen');
    ls.style.transition='opacity 1.6s ease';
    ls.style.opacity='0';
    // load YouTube
    document.getElementById('yt').src='https://www.youtube.com/embed/I5LOVxONI2E?autoplay=1&loop=1&playlist=I5LOVxONI2E&controls=0&mute=0';
    setTimeout(()=>{
      ls.style.display='none';
      document.getElementById('main-scene').style.display='flex';
      initScene();
    },1600);
  }else{
    err.classList.add('show');
    const c=document.getElementById('card');
    c.style.animation='none';
    requestAnimationFrame(()=>c.style.animation='cardShake .45s ease');
    setTimeout(()=>c.style.animation='',500);
  }
}
document.getElementById('loginBtn').addEventListener('click',doLogin);
document.addEventListener('keydown',e=>{if(e.key==='Enter')doLogin()});

/* shake inject */
const ss=document.createElement('style');
ss.textContent='@keyframes cardShake{0%,100%{transform:translateX(0)}15%{transform:translateX(-10px)}35%{transform:translateX(10px)}55%{transform:translateX(-6px)}75%{transform:translateX(6px)}}';
document.head.appendChild(ss);

/* scene */
function initScene(){
  /* stars */
  const sel=document.getElementById('stars');
  for(let i=0;i<140;i++){
    const s=document.createElement('div');s.className='star';
    const sz=Math.random()*2.2+.3;
    s.style.cssText=`left:${Math.random()*100}%;top:${Math.random()*85}%;width:${sz}px;height:${sz}px;--d:${(Math.random()*4+1.5).toFixed(1)}s;animation-delay:${(Math.random()*6).toFixed(1)}s`;
    sel.appendChild(s);
  }
  /* fireflies */
  const ffe=document.getElementById('fflies');
  for(let i=0;i<20;i++){
    const f=document.createElement('div');f.className='ff';
    const sz=Math.random()*3+1.5;
    f.style.cssText=`left:${Math.random()*92}%;bottom:${Math.random()*50+5}%;width:${sz}px;height:${sz}px;--dur:${(Math.random()*6+5).toFixed(1)}s;--del:${(Math.random()*7).toFixed(1)}s;--tx:${(Math.random()*100-50).toFixed(0)}px;--ty:${(Math.random()*-80-20).toFixed(0)}px`;
    ffe.appendChild(f);
  }
  /* hearts */
  const bbl=document.getElementById('bubbles');
  for(let i=0;i<32;i++){
    const b=document.createElement('div');
    const ring=i%4===0||i%6===0;
    b.className='bubble'+(ring?' ring':'');
    const sz=(Math.random()*3+1).toFixed(1);
    const col=COLS[~~(Math.random()*COLS.length)];
    b.style.cssText=`left:${Math.random()*100}%;--sz:${sz}vmin;--col:${col};--dur:${(Math.random()*8+7).toFixed(1)}s;--del:${(Math.random()*14).toFixed(1)}s;--dx:${(Math.random()*140-70).toFixed(0)}px`;
    b.innerHTML=`<svg viewBox="0 0 32 32"><path d="${HP}"/></svg>`;
    bbl.appendChild(b);
  }
}
</script>
